<!DOCTYPE html>
<html lang="lv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>English OL — CE OL/AL trenažieris</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500&display=swap');

:root{
  --bg:#08090b;
  --bg-soft:#0d0f13;
  --ink:#eef0f4;
  --ink-dim:#9aa2b1;
  --ink-mute:#5f6675;
  --line:rgba(255,255,255,.08);
  --line-soft:rgba(255,255,255,.05);
  --indigo:#6366f1;
  --indigo2:#818cf8;
  --cyan:#22d3ee;
  --emerald:#34d399;
  --rose:#fb7185;
  --amber:#fbbf24;
  --grad-main: linear-gradient(120deg, var(--indigo) 0%, var(--cyan) 100%);
  --grad-text: linear-gradient(120deg, #a5b4fc 0%, #67e8f9 100%);
  --shadow-glow: 0 0 0 1px rgba(99,102,241,.15), 0 20px 60px -20px rgba(99,102,241,.35);
  --deg: 302deg;
}

*,*::before,*::after{box-sizing:border-box;}
html{scroll-behavior:smooth;}
@media (prefers-reduced-motion: reduce){
  html{scroll-behavior:auto;}
  *,*::before,*::after{animation-duration:.001ms !important; animation-iteration-count:1 !important; transition-duration:.001ms !important; scroll-behavior:auto !important;}
}

body{
  margin:0;
  background:
    radial-gradient(1100px 620px at 78% -8%, rgba(99,102,241,.16), transparent 60%),
    radial-gradient(900px 520px at 8% 12%, rgba(34,211,238,.10), transparent 55%),
    var(--bg);
  color:var(--ink);
  font-family:'Inter',system-ui,-apple-system,sans-serif;
  -webkit-font-smoothing:antialiased;
  overflow-x:hidden;
}

::selection{background:rgba(99,102,241,.35); color:#fff;}

::-webkit-scrollbar{width:10px; height:10px;}
::-webkit-scrollbar-track{background:var(--bg);}
::-webkit-scrollbar-thumb{background:linear-gradient(180deg,var(--indigo),var(--cyan)); border-radius:8px; border:2px solid var(--bg);}

a{color:inherit; text-decoration:none;}
button{font-family:inherit; cursor:pointer;}
img{max-width:100%; display:block;}

.wrap{max-width:1180px; margin:0 auto; padding:0 24px;}
.eyebrow{
  font-family:'JetBrains Mono',monospace;
  font-size:12.5px;
  letter-spacing:.14em;
  text-transform:uppercase;
  color:var(--indigo2);
  display:inline-flex;
  align-items:center;
  gap:8px;
}
.eyebrow::before{content:''; width:6px; height:6px; border-radius:50%; background:var(--cyan); box-shadow:0 0 10px var(--cyan);}

h1,h2,h3,.disp{
  font-family:'Space Grotesk',sans-serif;
  letter-spacing:-.02em;
  line-height:1.05;
  margin:0;
}
.grad-text{
  background:var(--grad-text);
  -webkit-background-clip:text;
  background-clip:text;
  color:transparent;
}

.mono{font-family:'JetBrains Mono',monospace;}

/* ---------- glass surfaces ---------- */
.glass{
  background:rgba(255,255,255,.035);
  border:1px solid var(--line);
  border-radius:18px;
  backdrop-filter:blur(20px);
  -webkit-backdrop-filter:blur(20px);
}
.glass-strong{
  background:rgba(255,255,255,.045);
  border:1px solid rgba(255,255,255,.10);
  border-radius:22px;
  backdrop-filter:blur(28px);
  -webkit-backdrop-filter:blur(28px);
  box-shadow:0 30px 80px -40px rgba(0,0,0,.7);
}

.card-hover{transition:transform .35s cubic-bezier(.2,.8,.2,1), border-color .35s ease, box-shadow .35s ease;}
.card-hover:hover{transform:translateY(-6px); border-color:rgba(99,102,241,.4); box-shadow:var(--shadow-glow);}

/* ---------- buttons ---------- */
.btn{
  display:inline-flex;
  align-items:center;
  justify-content:center;
  gap:8px;
  font-weight:600;
  font-size:15px;
  padding:14px 28px;
  border-radius:999px;
  border:1px solid transparent;
  white-space:nowrap;
}
.btn-grad{
  background:var(--grad-main);
  color:#04050a;
  box-shadow:0 0 0 1px rgba(255,255,255,.08) inset, 0 18px 45px -14px rgba(99,102,241,.65);
  transition:transform .3s cubic-bezier(.2,.8,.2,1), box-shadow .3s ease;
  animation:glowPulse 3.2s ease-in-out infinite;
}
.btn-grad:hover{transform:scale(1.05); box-shadow:0 0 0 1px rgba(255,255,255,.12) inset, 0 22px 55px -12px rgba(34,211,238,.6);}
.btn-outline{
  background:transparent;
  color:var(--ink);
  border-color:var(--line);
  transition:border-color .3s ease, background .3s ease, transform .3s ease;
}
.btn-outline:hover{border-color:rgba(99,102,241,.5); background:rgba(99,102,241,.08); transform:translateY(-2px);}

@keyframes glowPulse{
  0%,100%{box-shadow:0 0 0 1px rgba(255,255,255,.08) inset, 0 18px 45px -14px rgba(99,102,241,.55);}
  50%{box-shadow:0 0 0 1px rgba(255,255,255,.1) inset, 0 18px 55px -10px rgba(34,211,238,.65);}
}

/* ---------- floating dashboard mock ---------- */
.float{animation:floaty 6.5s ease-in-out infinite;}
@keyframes floaty{
  0%,100%{transform:translateY(0);}
  50%{transform:translateY(-14px);}
}

.dot-live{
  width:7px; height:7px; border-radius:50%; background:var(--emerald);
  box-shadow:0 0 0 0 rgba(52,211,153,.6);
  animation:pulseDot 2s infinite;
}
@keyframes pulseDot{
  0%{box-shadow:0 0 0 0 rgba(52,211,153,.55);}
  70%{box-shadow:0 0 0 8px rgba(52,211,153,0);}
  100%{box-shadow:0 0 0 0 rgba(52,211,153,0);}
}

.pulse-amber{animation:pulseAmber 1.8s ease-in-out infinite;}
@keyframes pulseAmber{
  0%,100%{opacity:1;}
  50%{opacity:.45;}
}

/* progress bars */
.pbar{position:relative; height:8px; border-radius:999px; background:rgba(255,255,255,.08); overflow:hidden;}
.pbar > span{
  position:absolute; inset:0 auto 0 0; width:0%;
  border-radius:999px;
  background:var(--grad-main);
  transition:width 1.1s cubic-bezier(.16,.85,.24,1);
}
.pbar.thin{height:6px;}

/* mini barchart */
.mini-bars{display:flex; align-items:flex-end; gap:6px; height:56px;}
.mini-bars i{
  flex:1; display:block; border-radius:5px 5px 2px 2px;
  background:linear-gradient(180deg, var(--cyan), var(--indigo));
  height:20%;
  transition:height 1s cubic-bezier(.16,.85,.24,1);
  opacity:.9;
}

/* gauge (conic-gradient speedometer) */
.gauge{
  --deg: 302deg;
  position:relative;
  width:172px; height:172px;
  border-radius:50%;
  margin:0 auto;
  background:conic-gradient(var(--indigo) 0deg, var(--cyan) var(--deg), rgba(255,255,255,.08) var(--deg) 360deg);
  transition:background 1.2s cubic-bezier(.16,.85,.24,1);
  display:flex; align-items:center; justify-content:center;
}
.gauge::before{
  content:''; position:absolute; inset:14px; border-radius:50%;
  background:radial-gradient(circle at 30% 20%, #10131a, #08090b 70%);
}
.gauge-value{position:relative; z-index:1; font-family:'Space Grotesk',sans-serif; font-size:32px; font-weight:700;}

/* hero steps (how it works) */
.step-item{display:flex; gap:16px; align-items:flex-start; position:relative;}
.step-num{
  width:38px; height:38px; border-radius:11px; flex:none;
  background:var(--grad-main); color:#04050a;
  display:flex; align-items:center; justify-content:center;
  font-family:'Space Grotesk',sans-serif; font-weight:700; font-size:15px;
  box-shadow:0 6px 18px -6px rgba(99,102,241,.55);
  position:relative; z-index:1;
}
.step-connector{
  position:absolute; left:19px; top:38px; width:2px; height:calc(100% - 22px);
  background:linear-gradient(180deg, var(--indigo2), var(--cyan));
  opacity:.35;
}
.step-body{padding-top:6px;}
.step-title{font-family:'Space Grotesk',sans-serif; font-weight:600; font-size:15.5px; line-height:1.3;}
.step-desc{color:var(--ink-dim); font-size:13.5px; line-height:1.5; margin-top:4px;}

/* highlight classes for before/after */
.hl-err{background:rgba(251,113,133,.16); border-bottom:2px solid var(--rose); border-radius:3px; padding:0 2px;}
.hl-fix{background:rgba(52,211,153,.16); border-bottom:2px solid var(--emerald); border-radius:3px; padding:0 2px;}

/* reveal on scroll */
.reveal{opacity:0; transform:translateY(28px); transition:opacity .8s cubic-bezier(.16,.85,.24,1), transform .8s cubic-bezier(.16,.85,.24,1);}
.reveal.in{opacity:1; transform:translateY(0);}
.reveal-delay-1{transition-delay:.08s;}
.reveal-delay-2{transition-delay:.16s;}
.reveal-delay-3{transition-delay:.24s;}
.reveal-delay-4{transition-delay:.32s;}

/* comparison table */
.cmp-row{transition:background .25s ease;}
.cmp-row:hover{background:rgba(99,102,241,.08);}
.cmp-col-hero{background:linear-gradient(180deg, rgba(99,102,241,.12), rgba(34,211,238,.04));}

/* faq accordion */
.faq-item{border-bottom:1px solid var(--line);}
.faq-btn{
  width:100%; display:flex; align-items:center; justify-content:space-between;
  background:none; border:none; color:var(--ink); text-align:left;
  padding:22px 4px; font-size:16px; font-weight:600;
}
.faq-panel{
  display:grid; grid-template-rows:minmax(0,0fr); overflow:hidden; min-height:0;
  transition:grid-template-rows .35s cubic-bezier(.2,.8,.2,1);
}
.faq-panel > div{overflow:hidden; min-height:0;}
.faq-item.open .faq-panel{grid-template-rows:minmax(0,1fr);}
.faq-icon{position:relative; width:18px; height:18px; flex:none;}
.faq-icon::before,.faq-icon::after{
  content:''; position:absolute; background:var(--indigo2); border-radius:2px;
}
.faq-icon::before{left:0; top:8px; width:18px; height:2px;}
.faq-icon::after{left:8px; top:0; width:2px; height:18px; transition:transform .3s ease;}
.faq-item.open .faq-icon::after{transform:rotate(90deg) scaleY(0);}

/* option buttons in demo widget */
.opt-btn{
  border:1px solid var(--line); background:rgba(255,255,255,.03); color:var(--ink);
  border-radius:12px; padding:14px 16px; text-align:left; font-size:15px;
  display:flex; gap:10px; transition:border-color .25s ease, background .25s ease;
}
.opt-btn:hover{border-color:rgba(99,102,241,.4);}
.opt-btn.sel{border-color:var(--cyan); background:rgba(34,211,238,.08); box-shadow:0 0 0 1px rgba(34,211,238,.25) inset;}
.opt-btn.right{border-color:var(--emerald); background:rgba(52,211,153,.1); box-shadow:0 0 0 1px rgba(52,211,153,.3) inset;}
.opt-btn.right .opt-letter{background:rgba(52,211,153,.2); color:var(--emerald);}
.opt-btn.wrong{border-color:var(--rose); background:rgba(251,113,133,.1); box-shadow:0 0 0 1px rgba(251,113,133,.3) inset;}
.opt-btn.wrong .opt-letter{background:rgba(251,113,133,.2); color:var(--rose);}
.opt-letter{
  width:22px; height:22px; border-radius:6px; background:rgba(255,255,255,.06);
  display:flex; align-items:center; justify-content:center; font-size:12px; font-weight:700; flex:none;
  color:var(--ink-dim);
}

/* toggle (before/after, lang) */
.seg{display:inline-flex; background:rgba(255,255,255,.04); border:1px solid var(--line); border-radius:999px; padding:4px;}
.seg button{
  border:none; background:none; color:var(--ink-dim); padding:9px 18px; border-radius:999px; font-size:14px; font-weight:600;
  transition:color .25s ease, background .25s ease;
}
.seg button.active{background:rgba(52,211,153,.14); color:var(--emerald);}
.seg.lang button.active{background:rgba(99,102,241,.18); color:var(--indigo2);}
.seg.before-after button.active.is-before{background:rgba(251,113,133,.14); color:var(--rose);}

/* header */
.nav{
  position:sticky; top:0; z-index:50;
  background:rgba(8,9,11,.72);
  backdrop-filter:blur(16px); -webkit-backdrop-filter:blur(16px);
  border-bottom:1px solid var(--line-soft);
}
.nav-links a{
  color:var(--ink-dim); font-size:14.5px; font-weight:500; padding:8px 4px; position:relative;
}
.nav-links a::after{
  content:''; position:absolute; left:0; right:0; bottom:-2px; height:1px; background:var(--grad-main);
  transform:scaleX(0); transform-origin:left; transition:transform .3s ease;
}
.nav-links a:hover{color:var(--ink);}
.nav-links a:hover::after{transform:scaleX(1);}

.logo-mark{
  width:34px; height:34px; border-radius:10px;
  background:var(--grad-main);
  display:flex; align-items:center; justify-content:center;
  box-shadow:0 6px 20px -6px rgba(99,102,241,.6);
}

/* stat number */
.stat-num{
  font-family:'Space Grotesk',sans-serif; font-weight:700; font-size:clamp(38px,5vw,52px);
  background:var(--grad-text); -webkit-background-clip:text; background-clip:text; color:transparent;
}

/* icon square */
.icon-sq{
  width:46px; height:46px; border-radius:12px;
  background:linear-gradient(135deg, rgba(99,102,241,.28), rgba(34,211,238,.2));
  border:1px solid rgba(99,102,241,.3);
  display:flex; align-items:center; justify-content:center; color:var(--indigo2);
}

/* footer */
footer{border-top:1px solid var(--line-soft);}

/* mobile menu */
.mmenu{
  max-height:0; overflow:hidden; transition:max-height .35s cubic-bezier(.2,.8,.2,1);
}
.mmenu.open{max-height:340px;}

@media (max-width:860px){
  .grid-2{grid-template-columns:1fr !important;}
  .hero-grid{grid-template-columns:1fr !important;}
  .survey-grid{grid-template-columns:1fr 1fr !important; gap:14px !important;}
}
@media (max-width:520px){
  .survey-grid{grid-template-columns:1fr !important;}
}
@media (max-width:400px){
  #loginBtn{padding:8px 14px !important; font-size:13px !important;}
  .seg.lang button{padding:7px 12px !important; font-size:13px !important;}
}

.avatar{
  width:44px; height:44px; border-radius:50%;
  background:var(--grad-main);
  display:flex; align-items:center; justify-content:center;
  font-weight:700; color:#04050a; font-family:'Space Grotesk',sans-serif;
}

.blob{
  position:absolute; border-radius:50%; filter:blur(90px); opacity:.35; pointer-events:none;
}

/* ================= AUTH MODAL ================= */
.modal-ov{
  position:fixed; inset:0; z-index:999; display:none;
  background:rgba(5,6,9,.72); backdrop-filter:blur(6px);
  align-items:center; justify-content:center; padding:20px;
}
.modal-ov.open{display:flex;}
.modal-card{
  position:relative; width:100%; max-width:400px;
  background:var(--bg-soft); border:1px solid var(--line);
  border-radius:20px; padding:32px 28px 28px;
  box-shadow:0 30px 80px -20px rgba(0,0,0,.6), var(--shadow-glow);
  animation:modalIn .35s cubic-bezier(.16,.85,.24,1);
}
@keyframes modalIn{from{opacity:0; transform:translateY(16px) scale(.97);} to{opacity:1; transform:translateY(0) scale(1);}}
.modal-close{
  position:absolute; top:16px; right:16px; width:32px; height:32px;
  border-radius:10px; background:var(--line-soft); border:1px solid var(--line);
  color:var(--ink-dim); font-size:15px; display:flex; align-items:center; justify-content:center;
}
.modal-close:hover{color:var(--ink); background:var(--line);}
.modal-logo{font-family:'Space Grotesk',sans-serif; font-weight:700; font-size:19px; margin-bottom:22px;}
.modal-tabs{display:flex; gap:6px; background:var(--line-soft); border-radius:12px; padding:4px; margin-bottom:22px;}
.mtab{flex:1; padding:9px 0; border-radius:9px; font-size:14px; font-weight:600; color:var(--ink-mute); text-align:center;}
.mtab.active{background:#14151b; color:var(--ink); box-shadow:0 1px 0 rgba(255,255,255,.04) inset;}
.mform{display:none; flex-direction:column; gap:14px;}
.mform.on{display:flex;}
.mfield label{display:block; font-size:12.5px; color:var(--ink-dim); margin-bottom:6px; font-weight:600;}
.mfield input{
  width:100%; padding:11px 13px; border-radius:11px; border:1px solid var(--line);
  background:rgba(255,255,255,.03); color:var(--ink); font-size:14.5px; font-family:inherit;
  transition:border-color .2s;
}
.mfield input:focus{outline:none; border-color:var(--indigo2);}
.mbtn{
  width:100%; padding:12px 0; border-radius:11px; font-size:14.5px; font-weight:700;
  background:var(--grad-main); color:#04050a; margin-top:4px; display:flex; align-items:center; justify-content:center; gap:8px;
}
.mbtn:hover{filter:brightness(1.08);}
.mbtn:disabled{opacity:.65;}
.merr{display:none; color:var(--rose); font-size:13px; background:rgba(251,113,133,.1); border:1px solid rgba(251,113,133,.25); border-radius:10px; padding:9px 12px;}
.mok{display:none; color:var(--emerald); font-size:13px; background:rgba(52,211,153,.1); border:1px solid rgba(52,211,153,.25); border-radius:10px; padding:9px 12px;}
.mreg-note{font-size:12.5px; color:var(--ink-mute); line-height:1.5;}
.mspinner{
  display:inline-block; width:14px; height:14px; border-radius:50%;
  border:2px solid rgba(4,5,10,.3); border-top-color:#04050a; animation:mspin .7s linear infinite;
}
@keyframes mspin{to{transform:rotate(360deg);}}

</style>
</head>

<!-- ════ AUTH CHECK ════ -->
<script>

  if (localStorage.getItem("session_token")) {
    window.location.href = "/l/menu.html";
  }
</script>

<!-- ================= NAV ================= -->
<header class="nav">
  <div class="wrap" style="display:flex; align-items:center; justify-content:space-between; height:72px;">
    <div style="display:flex; align-items:center; gap:11px;">
      <div class="logo-mark">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none"><path d="M4 19V6.5C4 5.67 4.67 5 5.5 5H18a1 1 0 0 1 1 1v13" stroke="#04050a" stroke-width="2" stroke-linecap="round"/><path d="M4 19a2 2 0 0 0 2 2h13" stroke="#04050a" stroke-width="2" stroke-linecap="round"/><path d="M8 9h8M8 12.5h8" stroke="#04050a" stroke-width="1.6" stroke-linecap="round"/></svg>
      </div>
      <span style="font-family:'Space Grotesk',sans-serif; font-weight:700; font-size:18px;">English <span class="grad-text">OL</span></span>
    </div>

    <nav class="nav-links" style="display:flex; gap:32px;" id="navLinksDesktop">
      <a href="#features" data-nav="features"></a>
      <a href="#how" data-nav="how"></a>
      <a href="#pricing" data-nav="pricing"></a>
      <a href="#reviews" data-nav="reviews"></a>
    </nav>

    <div style="display:flex; align-items:center; gap:14px;">
      <div class="seg lang" id="langSwitch">
        <button data-lang="lv" class="active">LV</button>
        <button data-lang="ru">RU</button>
      </div>
      <button class="btn btn-outline" style="padding:10px 20px; font-size:14px;" data-nav="login" id="loginBtn"></button>
      <button id="burger" style="display:none; background:none; border:none; color:var(--ink); padding:6px;" aria-label="menu">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none"><path d="M4 7h16M4 12h16M4 17h16" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
      </button>
    </div>
  </div>
  <div class="mmenu wrap" id="mmenu">
    <div style="display:flex; flex-direction:column; gap:4px; padding:8px 0 20px;">
      <a href="#features" style="padding:12px 0; border-bottom:1px solid var(--line-soft);" data-nav="features"></a>
      <a href="#how" style="padding:12px 0; border-bottom:1px solid var(--line-soft);" data-nav="how"></a>
      <a href="#pricing" style="padding:12px 0; border-bottom:1px solid var(--line-soft);" data-nav="pricing"></a>
      <a href="#reviews" style="padding:12px 0;" data-nav="reviews"></a>
    </div>
  </div>
</header>

<!-- ================= HERO ================= -->
<section style="position:relative; padding:76px 0 40px; overflow:hidden;">
  <div class="blob" style="width:520px; height:520px; background:var(--indigo); top:-160px; right:-120px;"></div>
  <div class="blob" style="width:420px; height:420px; background:var(--cyan); bottom:-180px; left:-140px; opacity:.2;"></div>

  <div class="wrap hero-grid" style="position:relative; display:grid; grid-template-columns:1.05fr .95fr; gap:56px; align-items:center;">
    <div>
      <span class="eyebrow" id="heroEyebrow" style="margin-bottom:22px; display:inline-flex;"></span>
      <h1 class="disp" style="font-size:clamp(34px,4.6vw,54px); margin-top:18px;">
        <span id="heroT1"></span><span class="grad-text" id="heroT2"></span><span id="heroT3"></span>
      </h1>
      <p style="color:var(--ink-dim); font-size:17px; line-height:1.65; max-width:560px; margin-top:22px;" id="heroSub"></p>

      <div class="glass" style="margin-top:32px; padding:22px 24px; display:flex; flex-wrap:wrap; gap:22px; align-items:center; justify-content:space-between;">
        <div style="flex:1; min-width:240px;">
          <div style="display:flex; justify-content:space-between; font-size:13.5px; color:var(--ink-dim); margin-bottom:10px;">
            <span id="seatsLabel"></span><span class="mono" id="seatsVal" style="color:var(--ink); font-weight:600;"></span>
          </div>
          <div class="pbar"><span id="seatsBar"></span></div>
        </div>

    $('prGrid').innerHTML = `
      <div class="glass card-hover reveal" style="padding:34px;">
        <div style="color:var(--ink-dim); font-size:14.5px; margin-bottom:14px;">${p1.name}</div>
        <div style="display:flex; align-items:baseline; gap:8px; margin-bottom:22px;">
          <span style="font-family:'Space Grotesk',sans-serif; font-weight:700; font-size:38px;">${p1.price}</span>
          <span style="color:var(--ink-mute); font-size:13px;">${p1.unit}</span>
        </div>
        <ul style="list-style:none; padding:0; margin:0 0 28px; display:flex; flex-direction:column; gap:13px;">
          ${p1.feats.map(f=>`<li style="display:flex; gap:10px; font-size:14.5px; color:var(--ink-dim);"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="var(--emerald)" stroke-width="2.4" style="flex:none; margin-top:2px;"><path d="M20 6L9 17l-5-5"/></svg>${f}</li>`).join('')}
        </ul>
        <button class="btn btn-outline" style="width:100%;">${p1.cta}</button>
      </div>
      <div class="glass-strong reveal reveal-delay-1" style="padding:34px; position:relative; border:1px solid rgba(99,102,241,.4); animation:glowPulse 3.5s ease-in-out infinite;">
        <span style="position:absolute; top:-13px; left:34px; background:var(--grad-main); color:#04050a; font-size:12px; font-weight:700; padding:6px 14px; border-radius:999px;">${p2.badge}</span>

        <div style="display:flex; align-items:baseline; gap:8px; margin-bottom:6px;">
          <span style="font-family:'Space Grotesk',sans-serif; font-weight:700; font-size:38px;">${p2.price}</span>
        </div>
        <div style="color:var(--ink-mute); font-size:13px; margin-bottom:22px;">${p2.unit}</div>
        <ul style="list-style:none; padding:0; margin:0 0 28px; display:flex; flex-direction:column; gap:13px;">
          ${p2.feats.map(f=>`<li style="display:flex; gap:10px; font-size:14.5px; color:var(--ink-dim);"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="var(--emerald)" stroke-width="2.4" style="flex:none; margin-top:2px;"><path d="M20 6L9 17l-5-5"/></svg>${f}</li>`).join('')}
        </ul>
        <button class="btn btn-grad" style="width:100%;">${p2.cta}</button>
      </div>
    `;

    // faq
    txt('faqTitle', t.faq.title);
    $('faqList').innerHTML = t.faq.items.map((f,i)=>`
      <div class="faq-item" data-idx="${i}">
        <button class="faq-btn"><span>${f.q}</span><span class="faq-icon"></span></button>
        <div class="faq-panel"><div style="padding:0 4px 22px; color:var(--ink-dim); font-size:14.5px; line-height:1.6;">${f.a}</div></div>
      </div>
    `).join('');
    document.querySelectorAll('.faq-btn').forEach(btn=>{
      btn.onclick = ()=>{
        const item = btn.parentElement;
        const wasOpen = item.classList.contains('open');
        document.querySelectorAll('.faq-item').forEach(el=>el.classList.remove('open'));
        if(!wasOpen) item.classList.add('open');
      };
    });
    // keep first faq open by default
    const first = document.querySelector('.faq-item[data-idx="0"]');
    if(first) first.classList.add('open');

    // footer
    txt('ftSupport', t.footer.support);
    txt('ftPrivacy', t.footer.privacy);
    txt('ftTerms', t.footer.terms);
    txt('ftRights', t.footer.rights);

    // login button + lang switch labels
    txt('loginBtn', t.nav.login);

    observeReveals();
  }

  function renderBeforeAfter(){
    const t = T[lang].beforeafter;
    const src = showAfter ? t.textAfter : t.textBefore;
    const cls = showAfter ? 'hl-fix' : 'hl-err';
    const html = src.replace(/\|(.+?)\|/g, (m,p1)=>`<span class="${cls}">${p1}</span>`);
    $('baText').innerHTML = html;

    const statusColor = showAfter ? 'var(--emerald)' : 'var(--rose)';
    const statusIcon = showAfter ? '✓' : '✗';
    $('baStatus').innerHTML = `<span style="color:${statusColor}; font-weight:700;">${statusIcon}</span> <span style="color:${statusColor};">${showAfter ? t.statusAfter : t.statusBefore}</span>`;

    $('baExplain').style.display = showAfter ? 'block' : 'none';

    document.querySelectorAll('#baToggle button').forEach(b=>{
      b.classList.toggle('active', (b.getAttribute('data-state')==='after')===showAfter);
    });
  }

  function renderDemoResult(){
    const t = T[lang].demo;
    const answered = selOpt !== null;

    document.querySelectorAll('.opt-btn').forEach(b=>{
      const i = parseInt(b.getAttribute('data-i'));
      b.classList.remove('sel','right','wrong');
      if(!answered) return;
      if(i === t.correct) b.classList.add('right');
      else if(i === selOpt) b.classList.add('wrong');
    });

    $('demoResult').style.display = answered ? 'block' : 'none';
    $('demoHint').style.display = answered ? 'none' : 'flex';
    if(!answered) return;

    const isRight = selOpt === t.correct;
    const statusColor = isRight ? 'var(--emerald)' : 'var(--rose)';
    const statusIcon = isRight ? '✓' : '✗';
    $('demoStatus').innerHTML = `<span style="color:${statusColor}; font-weight:700;">${statusIcon}</span> <span style="color:${statusColor};">${isRight ? t.statusRight : t.statusWrong}</span>`;

    if(isRight){
      $('demoRule').innerHTML = `<span class="hl-fix">${t.opts[t.correct]}</span>`;
    } else {
      $('demoRule').innerHTML = `<span class="hl-err">${t.opts[selOpt]}</span> <span style="color:var(--ink-mute);">→</span> <span class="hl-fix">${t.opts[t.correct]}</span>`;
    }
    txt('demoExplain', t.ruleD);
  }

  // ---------- reveal on scroll ----------
  let revealObserver;
  function observeReveals(){
    if(revealObserver) revealObserver.disconnect();
    revealObserver = new IntersectionObserver((entries)=>{
      entries.forEach(e=>{ if(e.isIntersecting){ e.target.classList.add('in'); revealObserver.unobserve(e.target); } });
    }, { threshold:.12 });
    document.querySelectorAll('.reveal').forEach(el=>revealObserver.observe(el));
  }

  // ---------- animated bars / seats / gauge on load ----------
  function animateOnLoad(){
    setTimeout(()=>{
      $('seatsBar').style.width = '83%';
      document.querySelectorAll('#anBars i').forEach(i=>{ i.style.height = i.getAttribute('data-h')+'%'; });
    }, 400);
  }

  // ---------- nav interactions ----------
  function bindNav(){
    document.querySelectorAll('#langSwitch button').forEach(b=>{
      b.onclick = ()=>{
        lang = b.getAttribute('data-lang');
        document.querySelectorAll('#langSwitch button').forEach(x=>x.classList.toggle('active', x===b));
        selOpt = null;
        render();
      };
    });

    $('burger').onclick = ()=> $('mmenu').classList.toggle('open');
    document.querySelectorAll('#mmenu a').forEach(a=> a.onclick = ()=> $('mmenu').classList.remove('open'));

    document.querySelectorAll('#baToggle button').forEach(b=>{
      b.onclick = ()=>{ showAfter = b.getAttribute('data-state')==='after'; renderBeforeAfter(); };
    });

    function checkBurgerVisibility(){
      const isMobile = window.innerWidth <= 860;
      $('burger').style.display = isMobile ? 'flex' : 'none';
      $('navLinksDesktop').style.display = isMobile ? 'none' : 'flex';
    }
    checkBurgerVisibility();
    window.addEventListener('resize', checkBurgerVisibility);
  }

  document.addEventListener('DOMContentLoaded', ()=>{
    bindNav();
    render();
    animateOnLoad();
    bindAuthModal();
  });
})();

</script>

<script>
/* ── AUTH: логин / регистрация ─────────────────────────────
   Отдельный WORKER_URL от нейросети — этот модуль бьёт ТОЛЬКО
   в auth-worker (безопасность/логин/регистрация), никогда в ai-worker.
   ЗАМЕНИ на свой URL после деплоя auth-worker.
   ─────────────────────────────────────────────────────────── */
var AUTH_WORKER_URL = "https://auth-worker.gegeodin.workers.dev/";
var TELEGRAM_BOT_USERNAME = "mismisimsbot"; // без @ и без t.me/

// i18n для модалки — берёт текущий язык из внешнего замыкания через atrribute lang на <html>
var MODAL_T = {
  lv: {
    "m.login": "Ienākt", "m.register": "Reģistrēties",
    "m.user": "Lietotājvārds", "m.pass": "Parole", "m.login.btn": "Ieiet",
    "m.reg.name": "Vārds", "m.reg.username": "Vēlamais lietotājvārds",
    "m.reg.note": "Pēc pārbaudes tiksi novirzīts uz Telegram, lai pabeigtu reģistrāciju un saņemtu pieejas datus.",
    "m.reg.btn": "Turpināt →", "m.reg.redirecting": "Novirzām uz Telegram...",
    "m.fill": "Lūdzu, aizpildi visus laukus.", "m.ok": "Veiksmīgi! Novirzām...",
    "m.err.net": "Savienojuma kļūda.",
    "err.missing_fields": "Nav aizpildīti visi lauki", "err.invalid_credentials": "Nepareizs lietotājvārds vai parole",
    "err.rate_limited": "Pārāk daudz mēģinājumu. Mēģini vēlāk.", "err.subscription_inactive": "Abonements nav aktīvs",
    "err.subscription_expired": "Abonements beidzies", "err.device_limit": "Pārsniegts ierīču limits (maks. 3). Raksti Telegram, lai saņemtu palīdzību.",
    "err.name_too_long": "Vārds pārāk garš", "err.username_invalid_format": "Lietotājvārdā drīkst būt tikai latīņu burti, cipari un _ (3-20 simboli).",
    "err.username_taken": "Šis lietotājvārds jau aizņemts", "err.content_rejected": "Lūdzu, izmanto atbilstošu vārdu un lietotājvārdu",
    "err.server_error": "Servera kļūda", "err.unknown": "Kļūda. Mēģini vēlreiz."
  },
  ru: {
    "m.login": "Войти", "m.register": "Регистрация",
    "m.user": "Имя пользователя", "m.pass": "Пароль", "m.login.btn": "Войти",
    "m.reg.name": "Имя", "m.reg.username": "Желаемое имя пользователя",
    "m.reg.note": "После проверки ты будешь перенаправлен в Telegram, чтобы завершить регистрацию и получить данные для входа.",
    "m.reg.btn": "Продолжить →", "m.reg.redirecting": "Перенаправляем в Telegram...",
    "m.fill": "Пожалуйста, заполни все поля.", "m.ok": "Успешно! Перенаправляем...",
    "m.err.net": "Ошибка соединения.",
    "err.missing_fields": "Заполнены не все поля", "err.invalid_credentials": "Неверное имя пользователя или пароль",
    "err.rate_limited": "Слишком много попыток. Попробуй позже.", "err.subscription_inactive": "Подписка не активна",
    "err.subscription_expired": "Подписка истекла", "err.device_limit": "Превышен лимит устройств (макс. 3). Напиши в Telegram для помощи.",
    "err.name_too_long": "Имя слишком длинное", "err.username_invalid_format": "В имени пользователя допустимы только латинские буквы, цифры и _ (3-20 символов).",
    "err.username_taken": "Это имя пользователя уже занято", "err.content_rejected": "Пожалуйста, используй подходящее имя и имя пользователя",
    "err.server_error": "Ошибка сервера", "err.unknown": "Ошибка. Попробуй снова."
  }
};

function currentModalLang() {
  var l = document.documentElement.lang;
  return (l === "ru") ? "ru" : "lv";
}

function openModal(tab) {
  document.getElementById("authModal").classList.add("open");
  document.body.style.overflow = "hidden";
  switchTab(tab || "login");
  applyModalLang();
  setTimeout(function() {
    var first = document.querySelector(".mform.on input");
    if (first) first.focus();
  }, 120);
}

function closeModal() {
  document.getElementById("authModal").classList.remove("open");
  document.body.style.overflow = "";
  clearModalErrors();
}

function modalOverlayClick(e) {
  if (e.target === document.getElementById("authModal")) closeModal();
}

function switchTab(tab) {
  var isLogin = tab === "login";
  document.getElementById("tabLogin").classList.toggle("active", isLogin);
  document.getElementById("tabReg").classList.toggle("active", !isLogin);
  document.getElementById("mfLogin").classList.toggle("on", isLogin);
  document.getElementById("mfReg").classList.toggle("on", !isLogin);
  clearModalErrors();
}

function applyModalLang() {
  var dict = MODAL_T[currentModalLang()];
  document.querySelectorAll("#authModal [data-i18n]").forEach(function(el) {
    var k = el.getAttribute("data-i18n");
    if (dict[k] !== undefined) el.textContent = dict[k];
  });
}

function clearModalErrors() {
  ["mLoginErr","mLoginOk","mRegErr","mRegOk"].forEach(function(id) {
    var el = document.getElementById(id);
    if (el) { el.style.display="none"; el.textContent=""; }
  });
  var dict = MODAL_T[currentModalLang()];
  var lb = document.getElementById("mLoginBtn");
  if (lb) { lb.disabled = false; lb.innerHTML = "<span>" + dict["m.login.btn"] + "</span>"; }
  var rb = document.getElementById("mRegBtn");
  if (rb) { rb.disabled = false; rb.innerHTML = "<span>" + dict["m.reg.btn"] + "</span>"; }
}

function setBtnLoading(btnId) {
  var btn = document.getElementById(btnId);
  var label = btn.querySelector("span") ? btn.querySelector("span").textContent : btn.textContent;
  btn.disabled = true;
  btn.innerHTML = "<span>" + label + "</span><span class='mspinner'></span>";
}

function showErr(errId, msg) {
  var el = document.getElementById(errId);
  el.textContent = msg; el.style.display = "block";
}
function showOk(okId, msg) {
  var el = document.getElementById(okId);
  el.textContent = msg; el.style.display = "block";
}

function translateError(data) {
  var dict = MODAL_T[currentModalLang()];
  if (data && data.errorCode && dict["err." + data.errorCode]) {
    return dict["err." + data.errorCode];
  }
  if (data && data.error) return data.error;
  return dict["err.unknown"];
}

async function doLogin() {
  var dict = MODAL_T[currentModalLang()];
  var user = document.getElementById("mUser").value.trim();
  var pass = document.getElementById("mPass").value.trim();
  if (!user || !pass) { showErr("mLoginErr", dict["m.fill"]); return; }
  setBtnLoading("mLoginBtn");
  document.getElementById("mLoginErr").style.display = "none";
  try {
    var res = await fetch(AUTH_WORKER_URL + "login", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ username: user, password: pass })
    });
    var data = await res.json();
    if (!res.ok) {
      showErr("mLoginErr", translateError(data));
      document.getElementById("mLoginBtn").disabled = false;
      document.getElementById("mLoginBtn").innerHTML = "<span>" + dict["m.login.btn"] + "</span>";
      return;
    }
    localStorage.setItem("session_token", data.token);
    showOk("mLoginOk", dict["m.ok"]);
    setTimeout(function() { window.location.href = "/l/menu.html"; }, 900);
  } catch(e) {
    showErr("mLoginErr", dict["m.err.net"]);
    document.getElementById("mLoginBtn").disabled = false;
    document.getElementById("mLoginBtn").innerHTML = "<span>" + dict["m.login.btn"] + "</span>";
  }
}

async function doRegister() {
  var dict = MODAL_T[currentModalLang()];
  var name = document.getElementById("mRegName").value.trim();
  var user = document.getElementById("mRegUser").value.trim().toLowerCase();

  if (!name || !user) { showErr("mRegErr", dict["m.fill"]); return; }

  if (!/^[a-z0-9_]{3,20}$/.test(user)) {
    showErr("mRegErr", dict["err.username_invalid_format"]);
    return;
  }

  setBtnLoading("mRegBtn");
  document.getElementById("mRegErr").style.display = "none";
  try {
    // Если человек пришёл с test-result.html — там уже посчитанная сводка
    // результата теста и список ошибок лежат в sessionStorage. Передаём их
    // вместе с формой регистрации, auth-worker сам валидирует всё заново
    // на сервере.
    var testResultRaw = sessionStorage.getItem("quiz_result_summary");
    var testResult = null;
    if (testResultRaw) {
      try { testResult = JSON.parse(testResultRaw); } catch (e) { testResult = null; }
    }

    var mistakesRaw = sessionStorage.getItem("quiz_result_mistakes");
    var mistakes = null;
    if (mistakesRaw) {
      try { mistakes = JSON.parse(mistakesRaw); } catch (e) { mistakes = null; }
    }

    var res = await fetch(AUTH_WORKER_URL + "register-check", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ name: name, username: user, testResult: testResult, mistakes: mistakes })
    });
    var data = await res.json();
    if (!res.ok) {
      showErr("mRegErr", translateError(data));
      document.getElementById("mRegBtn").disabled = false;
      document.getElementById("mRegBtn").innerHTML = "<span>" + dict["m.reg.btn"] + "</span>";
      return;
    }
    showOk("mRegOk", dict["m.reg.redirecting"]);
    sessionStorage.removeItem("quiz_result_summary");
    sessionStorage.removeItem("quiz_result_mistakes");
    setTimeout(function() {
      window.location.href = "https://t.me/" + TELEGRAM_BOT_USERNAME + "?start=" + data.code;
    }, 600);
  } catch(e) {
    showErr("mRegErr", dict["m.err.net"]);
    document.getElementById("mRegBtn").disabled = false;
    document.getElementById("mRegBtn").innerHTML = "<span>" + dict["m.reg.btn"] + "</span>";
  }
}

function bindAuthModal() {
  // Кнопка "Ienākt/Войти" в шапке
  var loginBtn = document.getElementById("loginBtn");
  if (loginBtn) loginBtn.onclick = function() { openModal("login"); };

  // heroCta ("Reģistrēties") ведёт сразу на регистрацию.
  // survCta ("Sākt bez maksas") — это <a href="#pricing">, просто скроллит к тарифам,
  // модалку открывать не нужно — сначала человек должен увидеть цены.
  var heroCta = document.getElementById("heroCta");
  if (heroCta) heroCta.addEventListener("click", function() { openModal("register"); });

  // Кнопки внутри тарифных карточек (рендерятся динамически в prGrid)
  var prGrid = document.getElementById("prGrid");
  if (prGrid) {
    prGrid.addEventListener("click", function(e) {
      var btn = e.target.closest("button");
      if (btn) openModal("register");
    });
  }

  ["mUser","mPass"].forEach(function(id) {
    var el = document.getElementById(id);
    if (el) el.addEventListener("keydown", function(e) { if (e.key === "Enter") doLogin(); });
  });
  ["mRegName","mRegUser"].forEach(function(id) {
    var el = document.getElementById(id);
    if (el) el.addEventListener("keydown", function(e) { if (e.key === "Enter") doRegister(); });
  });

  document.addEventListener("keydown", function(e) { if (e.key === "Escape") closeModal(); });

  // Модалка должна переводиться при смене языка через основной переключатель
  document.querySelectorAll('#langSwitch button').forEach(function(b) {
    b.addEventListener('click', function() {
      if (document.getElementById("authModal").classList.contains("open")) applyModalLang();
    });
  });

  // Авто-открытие модалки регистрации при заходе с #register — используется
  // кнопкой "Открыть полный результат" на test-result.html (soft-wall после
  // бесплатного теста уровня).
  if (window.location.hash === "#register") {
    openModal("register");
  }
}
</script>
</body>
</html>
