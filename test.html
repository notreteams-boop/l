<!doctype html>
<html lang="lv">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>English OL — Pārbaudi savu līmeni</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=JetBrains+Mono:wght@500;600&display=swap" rel="stylesheet" />
<style>
  :root{
    --bg:#08090b; --bg-soft:#0d0f13; --ink:#eef0f4; --ink-dim:#9aa2b1; --ink-mute:#5f6675;
    --line:rgba(255,255,255,.08); --line-soft:rgba(255,255,255,.05);
    --indigo:#6366f1; --indigo2:#818cf8; --cyan:#22d3ee; --emerald:#34d399; --rose:#fb7185; --amber:#fbbf24;
    --grad-main: linear-gradient(120deg, var(--indigo) 0%, var(--cyan) 100%);
    --grad-text: linear-gradient(120deg, #a5b4fc 0%, #67e8f9 100%);
    --shadow-glow: 0 0 0 1px rgba(99,102,241,.15), 0 20px 60px -20px rgba(99,102,241,.35);
  }
  *,*::before,*::after{box-sizing:border-box;}
  html,body{margin:0;padding:0;background:var(--bg);color:var(--ink);min-height:100%}
  body{font-family:"Manrope",-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;letter-spacing:-.01em;-webkit-font-smoothing:antialiased;
    min-height:100vh; display:flex; flex-direction:column; align-items:center; padding:20px;}
  button{font-family:inherit; cursor:pointer; border:0; background:transparent; color:inherit;}
  a{color:inherit;text-decoration:none;}

  .ambient{position:fixed;inset:0;z-index:0;pointer-events:none;
    background:
      radial-gradient(600px 400px at 12% -5%,rgba(99,102,241,.12),transparent 60%),
      radial-gradient(500px 380px at 100% 10%,rgba(34,211,238,.08),transparent 60%);
  }

  .top{width:100%; max-width:640px; display:flex; align-items:center; gap:14px; margin-bottom:22px; position:relative; z-index:1;}
  .back-btn{
    width:36px; height:36px; border-radius:10px; background:var(--line-soft); border:1px solid var(--line);
    color:var(--ink-dim); display:flex; align-items:center; justify-content:center; flex:none;
  }
  .back-btn:hover{color:var(--ink); background:var(--line);}
  .progress-wrap{flex:1;}
  .progress-label{display:flex; justify-content:space-between; font-size:12.5px; color:var(--ink-mute); margin-bottom:6px; font-weight:600;}
  .progress-bar{height:6px; border-radius:99px; background:var(--line-soft); overflow:hidden;}
  .progress-fill{height:100%; background:var(--grad-main); border-radius:99px; transition:width .4s cubic-bezier(.16,.85,.24,1);}

  .card{
    position:relative; z-index:1; width:100%; max-width:640px;
    background:var(--bg-soft); border:1px solid var(--line); border-radius:20px;
    padding:28px 26px; box-shadow:0 30px 80px -20px rgba(0,0,0,.5);
    animation:cardIn .35s cubic-bezier(.16,.85,.24,1);
  }
  @keyframes cardIn{from{opacity:0; transform:translateY(14px);} to{opacity:1; transform:translateY(0);}}
  @keyframes cardOut{from{opacity:1; transform:translateY(0);} to{opacity:0; transform:translateY(-10px);}}
  .card.leaving{animation:cardOut .18s ease-out forwards;}

  .block-tag{
    display:inline-flex; align-items:center; gap:6px; font-size:11.5px; font-weight:700; text-transform:uppercase;
    letter-spacing:.04em; padding:5px 10px; border-radius:8px; margin-bottom:16px;
  }
  .block-tag.grammar{background:rgba(99,102,241,.12); color:var(--indigo2);}
  .block-tag.reading{background:rgba(34,211,238,.12); color:var(--cyan);}

  .passage{
    background:rgba(255,255,255,.025); border:1px solid var(--line); border-radius:14px;
    padding:16px 18px; margin-bottom:18px; font-size:14.5px; line-height:1.7; color:var(--ink-dim);
  }

  .question-text{font-size:18px; font-weight:700; line-height:1.4; margin:0 0 20px;}

  .options{display:flex; flex-direction:column; gap:10px;}
  .option{
    display:flex; align-items:center; gap:12px; padding:13px 15px; border-radius:13px;
    border:1px solid var(--line); background:rgba(255,255,255,.02); text-align:left;
    font-size:14.5px; transition:border-color .15s, background .15s;
  }
  .option:hover{border-color:rgba(99,102,241,.4); background:rgba(99,102,241,.06);}
  .option.selected{border-color:var(--indigo2); background:rgba(99,102,241,.12);}
  .option-letter{
    width:26px; height:26px; border-radius:8px; background:var(--line-soft); border:1px solid var(--line);
    display:flex; align-items:center; justify-content:center; font-size:12.5px; font-weight:700; color:var(--ink-mute); flex:none;
  }
  .option.selected .option-letter{background:var(--grad-main); color:#04050a; border-color:transparent;}

  .nav-row{display:flex; justify-content:flex-end; margin-top:24px;}
  .next-btn{
    padding:12px 26px; border-radius:12px; font-size:14.5px; font-weight:700;
    background:var(--grad-main); color:#04050a; display:flex; align-items:center; gap:8px;
  }
  .next-btn:hover{filter:brightness(1.08);}
  .next-btn:disabled{opacity:.4; pointer-events:none;}

  .intro-card{text-align:center; padding:40px 28px;}
  .intro-icon{
    width:56px; height:56px; border-radius:16px; background:var(--grad-main); margin:0 auto 20px;
    display:flex; align-items:center; justify-content:center;
  }
  .intro-title{font-size:22px; font-weight:800; margin:0 0 10px;}
  .intro-sub{color:var(--ink-dim); font-size:14.5px; line-height:1.6; margin:0 0 26px;}
  .intro-meta{display:flex; justify-content:center; gap:22px; margin-bottom:28px; flex-wrap:wrap;}
  .intro-meta-item{font-size:12.5px; color:var(--ink-mute); display:flex; align-items:center; gap:6px;}
  .start-btn{
    padding:14px 32px; border-radius:13px; font-size:15px; font-weight:700;
    background:var(--grad-main); color:#04050a;
  }
  .start-btn:hover{filter:brightness(1.08);}

  .lang-sw{position:fixed; top:20px; right:20px; display:flex; gap:4px; background:rgba(255,255,255,.04); border-radius:10px; padding:3px; z-index:2;}
  .lang-sw button{padding:5px 10px; border-radius:7px; font-size:12px; font-weight:700; color:var(--ink-mute);}
  .lang-sw button.active{background:var(--bg-soft); color:var(--ink);}
</style>
</head>
<body>

<div class="ambient"></div>
<div class="lang-sw" id="langSwitch">
  <button data-lang="lv" class="active">LV</button>
  <button data-lang="ru">RU</button>
</div>

<div class="top" id="topBar" style="display:none;">
  <button class="back-btn" onclick="goBack()" aria-label="Back">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
  </button>
  <div class="progress-wrap">
    <div class="progress-label">
      <span id="progLabel">1 / 15</span>
      <span id="progBlockLabel"></span>
    </div>
    <div class="progress-bar"><div class="progress-fill" id="progFill" style="width:0%"></div></div>
  </div>
</div>

<div id="root"></div>

<script src="/l/questions-bank.js"></script>
<script>
var T = {
  lv: {
    introTitle: "Pārbaudi savu angļu valodas līmeni",
    introSub: "15 jautājumi — gramatika un lasītprasme. Aizņem apmēram 5 minūtes. Rezultātā uzzināsi savu aptuveno CEFR līmeni un iespējamo procentuālo rezultātu eksāmenā.",
    metaQuestions: "15 jautājumi", metaTime: "~5 minūtes", metaFree: "Bez maksas",
    startBtn: "Sākt testu →",
    grammarTag: "Gramatika", readingTag: "Lasītprasme",
    nextBtn: "Tālāk", finishBtn: "Skatīt rezultātu",
    exitConfirm: "Vai tiešām vēlies pamest testu? Tavs progress netiks saglabāts."
  },
  ru: {
    introTitle: "Проверь свой уровень английского",
    introSub: "15 вопросов — грамматика и чтение. Займёт около 5 минут. В результате узнаешь примерный уровень CEFR и предполагаемый процент на экзамене.",
    metaQuestions: "15 вопросов", metaTime: "~5 минут", metaFree: "Бесплатно",
    startBtn: "Начать тест →",
    grammarTag: "Грамматика", readingTag: "Чтение",
    nextBtn: "Далее", finishBtn: "Смотреть результат",
    exitConfirm: "Точно хочешь выйти из теста? Прогресс не сохранится."
  }
};
var lang = "lv";

document.querySelectorAll("#langSwitch button").forEach(function(b) {
  b.addEventListener("click", function() {
    lang = b.getAttribute("data-lang");
    document.querySelectorAll("#langSwitch button").forEach(function(x) { x.classList.toggle("active", x === b); });
    render();
  });
});

// === Выбор 15 вопросов: 8 grammar + 7 reading, случайно из банка ===
function shuffle(arr) {
  var a = arr.slice();
  for (var i = a.length - 1; i > 0; i--) {
    var j = Math.floor(Math.random() * (i + 1));
    var tmp = a[i]; a[i] = a[j]; a[j] = tmp;
  }
  return a;
}

function pickQuestions() {
  var grammarPool = QUESTION_BANK.filter(function(q) { return q.block === "grammar"; });
  var readingPool = QUESTION_BANK.filter(function(q) { return q.block === "reading"; });
  var grammar8 = shuffle(grammarPool).slice(0, 8);
  var reading7 = shuffle(readingPool).slice(0, 7);
  // Grammar и reading чередуются блоками (все grammar, потом все reading) —
  // проще для восприятия, чем случайное перемешивание типов вопросов.
  return grammar8.concat(reading7);
}

var quizQuestions = pickQuestions();
var currentIndex = -1; // -1 = intro screen
var answers = []; // answers[i] = индекс выбранного варианта, или undefined

function goBack() {
  if (currentIndex <= 0) {
    window.location.href = "/l/";
    return;
  }
  if (confirm(T[lang].exitConfirm)) {
    window.location.href = "/l/";
  }
}

function selectOption(qIndex, optIndex) {
  answers[qIndex] = optIndex;
  updateSelection();
}

// Лёгкое обновление ТОЛЬКО подсветки выбранного варианта и состояния кнопки
// "Далее" — не трогает остальной DOM карточки, поэтому CSS-анимация появления
// карточки (cardIn) не проигрывается заново при каждом клике на вариант.
// render() полностью пересобирает карточку — используется только при смене
// вопроса, где новая анимация уместна.
function updateSelection() {
  var optionButtons = document.querySelectorAll(".option");
  optionButtons.forEach(function(btn, i) {
    btn.classList.toggle("selected", answers[currentIndex] === i);
  });

  var t = T[lang];
  var total = quizQuestions.length;
  var isLast = currentIndex === total - 1;
  var hasAnswer = answers[currentIndex] !== undefined;
  var nextBtn = document.getElementById("nextBtn");
  if (nextBtn) {
    nextBtn.disabled = !hasAnswer;
  }
}

function nextQuestion() {
  if (currentIndex >= quizQuestions.length - 1) {
    finishQuiz();
    return;
  }

  var currentCard = document.querySelector(".card");
  var topEl = document.getElementById("topBar");

  // Плавно скроллим к началу карточки ДО замены контента — пока пользователь
  // ещё видит старый вопрос, страница просто едет вверх плавно, без скачка.
  topEl.scrollIntoView({ behavior: "smooth", block: "start" });

  if (currentCard) {
    currentCard.classList.add("leaving");
    // Ждём короткую fade-out анимацию (см. .card.leaving в CSS), затем
    // меняем контент — так смена вопроса не выглядит как мгновенный скачок.
    setTimeout(function() {
      currentIndex++;
      render();
    }, 160);
  } else {
    currentIndex++;
    render();
  }
}

function startQuiz() {
  currentIndex = 0;
  render();
}

function finishQuiz() {
  // Результат передаётся через sessionStorage — переживает переход между
  // страницами (test.html → test-result.html), но не переживает закрытие
  // вкладки/браузера. Это осознанно: результат должен теряться, если
  // человек не дошёл до конца прямо сейчас (см. обсуждение архитектуры).
  var payload = {
    questions: quizQuestions.map(function(q, i) {
      return {
        id: q.id, block: q.block, question: q.question, passage: q.passage || null,
        options: q.options, correct: q.correct, explanation: q.explanation,
        userAnswer: answers[i] !== undefined ? answers[i] : null
      };
    })
  };
  sessionStorage.setItem("quiz_result", JSON.stringify(payload));
  window.location.href = "/l/test-result.html";
}

function render() {
  var root = document.getElementById("root");
  var topBar = document.getElementById("topBar");
  var t = T[lang];
  document.documentElement.lang = lang;

  if (currentIndex === -1) {
    topBar.style.display = "none";
    root.innerHTML =
      '<div class="card intro-card">' +
        '<div class="intro-icon"><svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="#04050a" stroke-width="2"><path d="M9 11l3 3L22 4M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg></div>' +
        '<h1 class="intro-title">' + t.introTitle + '</h1>' +
        '<p class="intro-sub">' + t.introSub + '</p>' +
        '<div class="intro-meta">' +
          '<div class="intro-meta-item">📝 ' + t.metaQuestions + '</div>' +
          '<div class="intro-meta-item">⏱ ' + t.metaTime + '</div>' +
          '<div class="intro-meta-item">✨ ' + t.metaFree + '</div>' +
        '</div>' +
        '<button class="start-btn" onclick="startQuiz()">' + t.startBtn + '</button>' +
      '</div>';
    return;
  }

  topBar.style.display = "flex";
  var q = quizQuestions[currentIndex];
  var total = quizQuestions.length;
  var progressPct = Math.round(((currentIndex) / total) * 100);
  document.getElementById("progLabel").textContent = (currentIndex + 1) + " / " + total;
  document.getElementById("progBlockLabel").textContent = q.block === "grammar" ? t.grammarTag : t.readingTag;
  document.getElementById("progFill").style.width = progressPct + "%";

  var html = '<div class="card">';
  html += '<span class="block-tag ' + q.block + '">' + (q.block === "grammar" ? t.grammarTag : t.readingTag) + '</span>';
  if (q.passage) {
    html += '<div class="passage">' + q.passage + '</div>';
  }
  html += '<p class="question-text">' + q.question + '</p>';
  html += '<div class="options">';
  var letters = ["A", "B", "C", "D"];
  q.options.forEach(function(opt, i) {
    var isSelected = answers[currentIndex] === i;
    html += '<button class="option' + (isSelected ? ' selected' : '') + '" onclick="selectOption(' + currentIndex + ', ' + i + ')">' +
              '<span class="option-letter">' + letters[i] + '</span>' +
              '<span>' + opt + '</span>' +
            '</button>';
  });
  html += '</div>';
  html += '<div class="nav-row">';
  var isLast = currentIndex === total - 1;
  var hasAnswer = answers[currentIndex] !== undefined;
  html += '<button class="next-btn" id="nextBtn" onclick="nextQuestion()" ' + (hasAnswer ? '' : 'disabled') + '>' +
            (isLast ? t.finishBtn : t.nextBtn) +
            '<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M5 12h14M12 5l7 7-7 7"/></svg>' +
          '</button>';
  html += '</div>';
  html += '</div>';
  root.innerHTML = html;
}

render();
</script>
</body>
</html>
