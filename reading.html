, answersTitle:"Таблица ответов", questionCol:"Вопрос", answerCol:"Ответ", check:"Проверить", save:"Сохранить в профиль", newTask:"Новое задание", explTag:"Объяснение", proofTag:"Доказательство в тексте", scoreLbl:"Результат", savedOk:"Задание сохранено в профиль", pickAll:"Пожалуйста, ответь на все вопросы", genErr:"Не удалось сгенерировать задание. Попробуй ещё раз.", locale:"ru-RU" } }; let lang = "lv"; let currentTask = null; /* {type, points, title, instruction, texts?, passage?, questions:[...]} */ let userAnswers = {}; /* { num: label } */ let graded = false; const $ = s => document.querySelector(s); const $$ = s => document.querySelectorAll(s); const esc = s => (s==null?"":String(s)).replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c])); /* Подсветить evidence-предложение зелёным внутри текста */ function highlight(body, evidence){ if(!evidence) return esc(body); const b = esc(body), ev = esc(evidence.trim()); const idx = b.indexOf(ev); if(idx<0) return b; return b.slice(0,idx)+'<mark class="ev">'+ev+'</mark>'+b.slice(idx+ev.length); } function applyLang(){ const t = dict[lang]; $$('[data-i]').forEach(el=>{ if(t[el.dataset.i]!==undefined) el.textContent=t[el.dataset.i]; }); document.documentElement.lang = lang; if(currentTask && !$('#taskView').classList.contains('hidden')) renderTask(); } /* ================= Navigation ================= */ function showSelector(){ $('#taskView').classList.add('hidden'); $('#selectorView').classList.remove('hidden'); currentTask = null; userAnswers = {}; graded = false; } function goMenu(){ window.location.href = "/l/menu.html"; } $('#topBack').addEventListener('click',()=>{ if($('#selectorView').classList.contains('hidden')) showSelector(); else goMenu(); }); $('#taskBack').addEventListener('click', showSelector); $$('.seg-item[data-lang]').forEach(el=>el.addEventListener('click',()=>{ $$('.seg-item[data-lang]').forEach(x=>x.classList.remove('active')); el.classList.add('active'); lang = el.dataset.lang; applyLang(); })); $$('.task[data-type]').forEach(c=>c.addEventListener('click',()=>startTask(+c.dataset.type))); /* ================= Generation ================= */ async function startTask(type){ $('#selectorView').classList.add('hidden'); $('#taskView').classList.remove('hidden'); await generate(type); } $('#regenBtn').addEventListener('click',()=>{ if(currentTask) generate(currentTask.type); }); async function generate(type){ graded = false; userAnswers = {}; $('#taskContent').classList.add('hidden'); $('#taskError').classList.remove('show'); $('#taskLoading').classList.remove('hidden'); window.scrollTo({top:0,behavior:'smooth'}); const token = localStorage.getItem("session_token"); try{ const res = await fetch(AI_WORKER_URL + "generate-reading-task",{ method:"POST", headers:{ "Content-Type":"application/json", "Authorization":"Bearer "+token }, body: JSON.stringify({ taskType:"task"+type, lang:lang }) }); if(res.status===401||res.status===403){ localStorage.removeItem("session_token"); location.href="/l/login.html?expired=1"; return; } const raw = await res.text(); if(!res.ok){ if(res.status===429){ $('#taskLoading').classList.add('hidden'); const eb = $('#taskError'); eb.textContent = lang==="lv" ? "Lūdzu, uzgaidi dažas sekundes pirms nākamā uzdevuma un mēģini vēlreiz." : "Подожди несколько секунд перед следующим заданием и попробуй ещё раз."; } throw new Error("gen-notok-" + res.status + "-" + raw.slice(0,150)); } const envelope = JSON.parse(raw); /* Worker atbild ar {task, id, fromPool} — pats uzdevums ir envelope.task, nevis envelope pats. Ja envelope.task nav klāt (negaidīta forma), krītam uz catch/DEMO tāpat kā jebkuras citas kļūdas gadījumā. */ if(!envelope || !envelope.task) throw new Error("gen"); const data = envelope.task; data.type = type; currentTask = data; renderTask(); $('#taskLoading').classList.add('hidden'); $('#taskContent').classList.remove('hidden'); }catch(e){ if(DEMO[type]){ currentTask = JSON.parse(JSON.stringify(DEMO[type])); currentTask.type = type; currentTask.title = "[DEMO] " + currentTask.title + " — iemesls/причина: " + (e && e.message ? e.message : String(e)); renderTask(); $('#taskLoading').classList.add('hidden'); $('#taskContent').classList.remove('hidden'); }else{ $('#taskLoading').classList.add('hidden'); const eb = $('#taskError'); eb.textContent = dict[lang].genErr; eb.classList.add('show'); } } } /* ================= Render ================= */ function renderTask(){ const t = dict[lang], task = currentTask; $('#taskEyebrow').textContent = "Reading · " + (lang==="lv"?"uzdevums":"задание") + " " + task.type; $('#taskTitle').textContent = task.title || ""; $('#taskInstruction').textContent = task.instruction || ""; $('#taskPoints').textContent = (task.points||task.questions.length) + " " + t.pts; /* Texts / passage */ const box = $('#textsBox'); box.innerHTML = ""; if(task.type===1 && task.texts){ task.texts.forEach(tx=>{ const ev = graded ? evidenceFor(tx.letter) : null; box.insertAdjacentHTML('beforeend', `<div class="text-item"><div class="lbl"><span class="letter">${esc(tx.letter)}</span>`+ `<span class="author">${esc(tx.author||"")}</span></div>`+ `<div class="body">${highlight(tx.body||"", ev)}</div></div>`); }); $('#textsPanel').classList.remove('hidden'); } else if(task.passage){ let evAll = null; if(graded){ /* highlight all correct evidences in single passage */ box.insertAdjacentHTML('beforeend', `<div class="text-item">${task.title?`<div class="lbl"><span class="author">${esc(task.title)}</span></div>`:""}`+ `<div class="body">${passageHighlighted()}</div></div>`); } else { box.insertAdjacentHTML('beforeend', `<div class="text-item">${task.title?`<div class="lbl"><span class="author">${esc(task.title)}</span></div>`:""}`+ `<div class="body">${esc(task.passage)}</div></div>`); } $('#textsPanel').classList.remove('hidden'); } /* Questions table */ const tb = $('#questionsBody'); tb.innerHTML = ""; task.questions.forEach(q=>{ const opts = q.options ? q.options.map(o=>o.label) : ["A","B","C","D","E"].slice(0, (task.texts?task.texts.length:5)); const pills = opts.map(lab=>pillHTML(q.num, lab)).join(""); let optionsText = ""; if(q.options && q.options.some(o=>o.text && o.text!==o.label)){ optionsText = `<div class="q-options-text">`+q.options.map(o=>`<span class="opt"><b>${esc(o.label)}.</b>${esc(o.text)}</span>`).join("")+`</div>`; } const ansState = graded ? (userAnswers[q.num]===q.correct?"correct":"wrong") : ""; const explText = (lang==="lv" ? q.explanation_lv : q.explanation_ru) || q.explanation || ""; const evidenceText = q.evidenceQuote || q.evidence || ""; tb.insertAdjacentHTML('beforeend', `<tr data-row="${q.num}"> <td><div class="q-num">${q.num}</div></td> <td><div class="q-prompt">${esc(q.prompt)}</div>${optionsText} <button type="button" class="expl-trigger ${graded?'':'hidden'}" data-num="${q.num}" aria-expanded="false"> <svg class="i i-md" viewBox="0 0 24 24"><polyline points="9 18 15 12 9 6"/></svg> ${t.explTag} </button> <div class="expl" id="expl-${q.num}"> <div class="tag">✦ ${t.explTag}</div> <div class="txt">${esc(explText)}</div> ${evidenceText?`<div class="proof"><b>${t.proofTag}:</b> “${esc(evidenceText)}”</div>`:""} </div> </td> <td class="ans-cell ${ansState}"><div class="pills">${pills}</div></td> </tr>`); }); bindPills(); bindExplTriggers(); /* score */ $('#scoreBox').classList.toggle('hidden', !graded); $('#checkBtn').classList.toggle('hidden', graded); } function pillHTML(num, lab){ const sel = userAnswers[num]===lab; let cls = "pill" + (sel?" sel":""); if(graded){ const correct = currentTask.questions.find(q=>q.num===num).correct; if(sel) cls += (lab===correct?" ok":" bad"); else if(lab===correct) cls += " reveal"; } return `<button class="${cls}" data-num="${num}" data-lab="${esc(lab)}" ${graded?"disabled":""}>${esc(lab)}</button>`; } function bindPills(){ $$('.pill:not(:disabled)').forEach(p=>p.addEventListener('click',()=>{ const num=+p.dataset.num, lab=p.dataset.lab; userAnswers[num]=lab; p.closest('tr').querySelectorAll('.pill').forEach(x=>x.classList.remove('sel')); p.classList.add('sel'); })); } function bindExplTriggers(){ $$('.expl-trigger').forEach(btn=>btn.addEventListener('click',()=>{ const panel = $('#expl-'+btn.dataset.num); const nowOpen = !panel.classList.contains('show'); panel.classList.toggle('show', nowOpen); btn.classList.toggle('open', nowOpen); btn.setAttribute('aria-expanded', String(nowOpen)); })); } function evidenceFor(letter){ /* in matching, evidence sits on the question whose correct === letter */ const q = currentTask.questions.find(q=>q.correct===letter && q.evidence); return q ? q.evidence : null; } function passageHighlighted(){ let html = esc(currentTask.passage); const evs = currentTask.questions.map(q=>q.evidence).filter(Boolean); evs.forEach(ev=>{ const e = esc(ev.trim()); if(e && html.indexOf('<mark')===-1 || html.indexOf(e)>=0){ const idx = html.indexOf(e); if(idx>=0 && html.slice(idx-6,idx).indexOf('mark')<0){ html = html.slice(0,idx)+'<mark class="ev">'+e+'</mark>'+html.slice(idx+e.length); } } }); return html; } /* ================= Check ================= */ $('#checkBtn').addEventListener('click',()=>{ const total = currentTask.questions.length; if(Object.keys(userAnswers).length < total){ toast(dict[lang].pickAll, false); return; } graded = true; let correct = 0; currentTask.questions.forEach(q=>{ if(userAnswers[q.num]===q.correct) correct++; }); renderTask(); const sb = $('#scoreBox'); sb.innerHTML = `${dict[lang].scoreLbl}: <span class="mono" style="color:${correct===total?'var(--green)':'var(--cyan)'}">${correct}/${total}</span>`; sb.classList.remove('hidden'); /* начисляем баллы через ai-worker /solve (не блокируем UI) */ sendSolve(correct===total); window.scrollTo({top:0,behavior:'smooth'}); }); async function sendSolve(isCorrect){ const token = localStorage.getItem("session_token"); if(!token) return; try{ await fetch(AI_WORKER_URL+"solve",{method:"POST", headers:{"Content-Type":"application/json","Authorization":"Bearer "+token}, body:JSON.stringify({isCorrect:isCorrect, questionsOpened:false})}); }catch(e){} } /* ================= Save ================= */ $('#saveBtn').addEventListener('click', async ()=>{ if(!currentTask) return; const token = localStorage.getItem("session_token"); if(!token) return; const payload = { task: { kind:"reading", type:currentTask.type, title:currentTask.title||"", instruction:currentTask.instruction||"", texts:currentTask.texts||[], passage:currentTask.passage||"", questions:currentTask.questions, userAnswers: userAnswers }}; $('#saveBtn').disabled = true; try{ const res = await fetch(AI_WORKER_URL+"save-task",{method:"POST", headers:{"Content-Type":"application/json","Authorization":"Bearer "+token}, body:JSON.stringify(payload)}); if(res.ok) toast(dict[lang].savedOk, true); else { const d=await res.json().catch(()=>({})); toast(d.error||"Error", false); } }catch(e){ toast(dict[lang].savedOk, true); } finally{ setTimeout(()=>{$('#saveBtn').disabled=false;}, 800); } }); function toast(msg, ok){ const el=$('#toast'); $('#toastMsg').textContent=msg; el.style.borderColor = ok? "rgba(52,211,153,.4)":"rgba(248,113,113,.4)"; el.querySelector('svg').style.color = ok?"var(--green)":"var(--red)"; el.classList.add('show'); setTimeout(()=>el.classList.remove('show'),2600); } /* ================= Demo fallback (offline / dev) ================= */ const DEMO = { 1:{ points:7, title:"First AntiGravity class experiences", instruction:"Read the comments (A–D) and answer the questions. For each question (1–7) choose one text. Each text may be used more than once.", texts:[ {letter:"A",author:"Oliver",body:"I wasn't completely sold on this type of fitness, but a friend kept encouraging me to give it a try. The first few positions felt manageable, though I noticed how stiff I was. As we moved on to more complex movements, the instructor offered comments that felt oddly relevant to what I was struggling with. By the end, I was surprised at how energized I felt. While I'm still not convinced it will transform my health, I see how it could fit into my routine."}, {letter:"B",author:"Maria",body:"I signed up for a free trial expecting slow stretching. Instead, I found myself wobbling through balance movements — an unexpected challenge I really enjoyed. This experience opened a door to something I didn't know I needed. Only three weeks later I signed up for a weekend fitness retreat. I can now genuinely call myself an enthusiast; it revealed a new dimension of my own strength."}, {letter:"C",author:"Liam",body:"I went in pretty open-minded. Unfortunately, the whole session felt superficial. The instructor led us through a sequence with no real explanation and spoke in generalities. When I asked for clarification, she smiled but didn't answer, which felt dismissive. It seemed like she was more focused on creating a serene mood than actually helping people learn. I left feeling frustrated — not because it was hard, but because the guidance wasn't there."}, {letter:"D",author:"Sophia",body:"I'd spent time on fitness forums before I attended. I thought it looked beautiful but wondered how challenging it could really be compared to a spin class. The instructor was nice and the environment fine, but it felt a bit basic. I kept waiting for the advanced part, but it seemed geared toward absolute newcomers. I didn't walk away convinced it provides more than what I could get on my own."} ], questions:[ {num:1,prompt:"Who found the instructor's comments about their physical abilities surprisingly accurate and useful?",correct:"A",evidence:"the instructor offered comments that felt oddly relevant to what I was struggling with",explanation:"Oliver says the instructor's remarks felt 'oddly relevant' to his exact struggles — i.e. surprisingly accurate and helpful."}, {num:2,prompt:"Who felt the instructor wasn't responsive to their individual needs?",correct:"C",evidence:"When I asked for clarification, she smiled but didn't answer, which felt dismissive.",explanation:"Liam asked for clarification and got no answer — the instructor did not respond to his personal need."}, {num:3,prompt:"Who felt physically better after the class, despite having some doubts before?",correct:"A",evidence:"By the end, I was surprised at how energized I felt.",explanation:"Oliver was doubtful ('not completely sold') yet felt energized afterwards."}, {num:4,prompt:"Who went to the class hoping to see how it matched up with what they'd learned on their own?",correct:"D",evidence:"I'd spent time on fitness forums before I attended.",explanation:"Sophia had researched beforehand and came to compare it with her own knowledge."}, {num:5,prompt:"Whose approach to fitness was transformed by the class?",correct:"B",evidence:"it revealed a new dimension of my own strength.",explanation:"Maria became an 'enthusiast' and signed up for a retreat — a real transformation."}, {num:6,prompt:"Who felt that the class was more about creating an atmosphere rather than a proper learning environment?",correct:"C",evidence:"more focused on creating a serene mood than actually helping people learn",explanation:"Liam explicitly contrasts 'mood' with real learning."}, {num:7,prompt:"Who went with certain expectations and ended up having a better experience than they imagined?",correct:"B",evidence:"expecting slow stretching. Instead, I found myself wobbling through balance movements — an unexpected challenge I really enjoyed.",explanation:"Maria expected something dull but enjoyed it far more than imagined."} ] }, 2:{ points:6, title:"The Return of the Night Train", instruction:"Read the text and for each question (1–6) choose the correct option (A, B, C or D).", passage:"For decades the night train seemed a relic of a slower age, pushed aside by cheap flights and high-speed rail. Yet across Europe sleeper services are quietly returning. Austrian operator ÖBB led the revival, buying up routes that others had abandoned and rebranding them as Nightjet. The appeal is partly environmental: a passenger travelling overnight from Vienna to Brussels emits a fraction of the carbon of a short-haul flight. But nostalgia alone does not fill carriages. Operators have learned that comfort matters more than romance. Modern sleepers offer private cabins with showers, quiet lighting and mobile charging, features absent from the draughty couchettes of the past. Critics point out that night trains remain expensive to run; they occupy track space for long periods and earn less per seat than a daytime service. Governments, however, increasingly see them as worth subsidising, viewing the loss on paper as a gain for climate targets. Whether the revival lasts may depend less on travellers' goodwill than on whether that political support endures.", questions:[ {num:1,prompt:"According to the text, why did night trains decline in the first place?",options:[{label:"A",text:"Passengers found them uncomfortable."},{label:"B",text:"They were replaced by budget flights and fast trains."},{label:"C",text:"Governments stopped funding them."},{label:"D",text:"They were considered unsafe."}],correct:"B",evidence:"pushed aside by cheap flights and high-speed rail",explanation:"The text states night trains were 'pushed aside by cheap flights and high-speed rail'."}, {num:2,prompt:"What was ÖBB's role in the revival?",options:[{label:"A",text:"It invented a new type of train."},{label:"B",text:"It lobbied the EU for funding."},{label:"C",text:"It took over routes others had dropped."},{label:"D",text:"It lowered ticket prices."}],correct:"C",evidence:"buying up routes that others had abandoned and rebranding them as Nightjet",explanation:"ÖBB bought abandoned routes and rebranded them as Nightjet."}, {num:3,prompt:"The writer suggests that the main attraction of night trains today is:",options:[{label:"A",text:"their low environmental impact"},{label:"B",text:"their romantic atmosphere"},{label:"C",text:"their speed"},{label:"D",text:"their low cost"}],correct:"A",evidence:"The appeal is partly environmental",explanation:"The appeal is described as 'partly environmental', with a carbon comparison to flights."}, {num:4,prompt:"What lesson have operators learned?",options:[{label:"A",text:"Romance sells tickets."},{label:"B",text:"Comfort matters more than romance."},{label:"C",text:"Lower prices attract more travellers."},{label:"D",text:"Speed is the key selling point."}],correct:"B",evidence:"comfort matters more than romance",explanation:"Operators learned that 'comfort matters more than romance'."}, {num:5,prompt:"Why do critics doubt the model?",options:[{label:"A",text:"Trains are too slow."},{label:"B",text:"There are not enough passengers."},{label:"C",text:"They are expensive to run and earn less per seat."},{label:"D",text:"Cabins are uncomfortable."}],correct:"C",evidence:"expensive to run; they occupy track space for long periods and earn less per seat",explanation:"Critics cite high running cost and lower earnings per seat."}, {num:6,prompt:"What does the writer conclude about the future of night trains?",options:[{label:"A",text:"It is guaranteed by traveller demand."},{label:"B",text:"It depends mainly on political support."},{label:"C",text:"It will fail without nostalgia."},{label:"D",text:"It will be decided by ticket prices."}],correct:"B",evidence:"may depend less on travellers' goodwill than on whether that political support endures",explanation:"The revival depends on whether political support endures, not on goodwill alone."} ] }, 3:{ points:7, title:"The Rediscovery of Silence", instruction:"Read the text and decide if each statement (1–7) is True (T), False (F) or Not Given (NG).", passage:"When the Finnish tourist board launched a campaign promoting the country as a place of pure silence, many marketing experts were sceptical. Selling 'nothing', they argued, was impossible. Yet the campaign struck a nerve. In an age of constant notifications, the idea of genuine quiet had become oddly desirable. Researchers have since found that regular exposure to silence can lower stress hormones and even encourage the growth of new brain cells in mice. The findings are preliminary and have not been replicated in humans. Still, wellness retreats built around silence have multiplied, some charging remarkable sums for a weekend without speaking. Not everyone is convinced. Sceptics note that true silence is almost unattainable; even in remote forests the body hears its own heartbeat. Others worry that turning quiet into a luxury product excludes those who cannot afford it. The Finnish campaign, meanwhile, has been widely imitated by other Nordic countries hoping to attract the same reflective traveller.", questions:[ {num:1,prompt:"Marketing experts immediately supported the Finnish campaign.",options:[{label:"T",text:"True"},{label:"F",text:"False"},{label:"NG",text:"Not Given"}],correct:"F",evidence:"many marketing experts were sceptical",explanation:"They were sceptical, so the statement is False."}, {num:2,prompt:"The research on silence and brain cells was carried out on mice.",options:[{label:"T",text:"True"},{label:"F",text:"False"},{label:"NG",text:"Not Given"}],correct:"T",evidence:"encourage the growth of new brain cells in mice",explanation:"The text states the brain-cell finding was in mice — True."}, {num:3,prompt:"The findings about silence have been confirmed in humans.",options:[{label:"T",text:"True"},{label:"F",text:"False"},{label:"NG",text:"Not Given"}],correct:"F",evidence:"have not been replicated in humans",explanation:"The text says they have NOT been replicated in humans — False."}, {num:4,prompt:"Some silence retreats charge high prices.",options:[{label:"T",text:"True"},{label:"F",text:"False"},{label:"NG",text:"Not Given"}],correct:"T",evidence:"charging remarkable sums for a weekend without speaking",explanation:"Retreats charge 'remarkable sums' — True."}, {num:5,prompt:"The Finnish campaign was the most expensive tourism campaign ever run.",options:[{label:"T",text:"True"},{label:"F",text:"False"},{label:"NG",text:"Not Given"}],correct:"NG",evidence:"",explanation:"The text never mentions the campaign's cost or comparisons — Not Given."}, {num:6,prompt:"Critics argue that complete silence is virtually impossible to reach.",options:[{label:"T",text:"True"},{label:"F",text:"False"},{label:"NG",text:"Not Given"}],correct:"T",evidence:"true silence is almost unattainable",explanation:"Sceptics say true silence is 'almost unattainable' — True."}, {num:7,prompt:"Other Nordic countries have copied the Finnish approach.",options:[{label:"T",text:"True"},{label:"F",text:"False"},{label:"NG",text:"Not Given"}],correct:"T",evidence:"widely imitated by other Nordic countries",explanation:"The campaign was 'widely imitated by other Nordic countries' — True."} ] } }; /* ================= Init ================= */ function init(){ applyLang(); } if (window.authReady) init(); else document.addEventListener("auth-ready", init, {once:true}); </script> </body> </html>
