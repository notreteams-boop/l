<!DOCTYPE html>
<html lang="lv">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>English OL — Klausīšanās 1</title>

<!-- auth.js ОБЯЗАТЕЛЬНО первой строкой в head — тот же паттерн, что в
     speaking.html/reading.html: скрывает страницу до проверки токена. -->
<script src="/l/auth.js"></script>

<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link
  href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap"
  rel="stylesheet"
/>

<style>
  :root {
    --bg: #08080b; --card: #101017; --card2: #14141c;
    --bd: rgba(255,255,255,.06); --bdh: rgba(255,255,255,.12);
    --t: #f4f5f7; --td: #a4a7b3; --tm: #6a6d7a;
    --cyan: #6cf0e0; --indigo: #7c8cff; --violet: #a78bfa;
    --amber: #fbbf24; --green: #34d399; --red: #f87171;
    --grad: linear-gradient(135deg, #7c8cff 0%, #56d4ff 55%, #6cf0e0 100%);
    --r: 18px;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; background: var(--bg); color: var(--t); min-height: 100%; }
  body { font-family: "Manrope", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; letter-spacing: -.01em; -webkit-font-smoothing: antialiased; }
  .mono { font-family: "JetBrains Mono", ui-monospace, monospace; letter-spacing: 0; }
  a, button, textarea, input { font-family: inherit; }
  button { cursor: pointer; border: 0; background: transparent; color: inherit; }

  .ambient { position: fixed; inset: 0; z-index: 0; pointer-events: none;
    background: radial-gradient(600px 400px at 12% -5%, rgba(124,140,255,.14), transparent 60%),
      radial-gradient(700px 500px at 105% 10%, rgba(167,139,250,.09), transparent 60%),
      radial-gradient(800px 600px at 50% 110%, rgba(86,212,255,.06), transparent 60%); }
  .grain { position: fixed; inset: 0; z-index: 1; pointer-events: none; opacity: .035; mix-blend-mode: overlay;
    background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='160' height='160'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='2' stitchTiles='stitch'/></filter><rect width='100%25' height='100%25' filter='url(%23n)' opacity='0.9'/></svg>"); }

  .wrap { position: relative; z-index: 2; max-width: 1080px; margin: 0 auto; padding: 0 32px; }
  @media (max-width: 640px) { .wrap { padding: 0 18px; } }

  header { border-bottom: 1px solid var(--bd); }
  .hd { display: flex; align-items: center; justify-content: space-between; padding: 18px 0; gap: 14px; }
  .logo { display: flex; align-items: center; gap: 12px; }
  .logo-b { width: 36px; height: 36px; border-radius: 12px; background: var(--grad); display: flex; align-items: center; justify-content: center; color: #0b0b12; }
  .logo-t { font-weight: 800; font-size: 17px; letter-spacing: -.02em; }
  .logo-t span { color: rgba(255,255,255,.55); }
  .logo-s { font-size: 10px; letter-spacing: .22em; color: rgba(255,255,255,.4); text-transform: uppercase; margin-top: 2px; }
  .cluster { display: flex; align-items: center; gap: 10px; }
  .seg { background: rgba(255,255,255,.04); border: 1px solid var(--bd); border-radius: 999px; padding: 3px; display: inline-flex; gap: 2px; }
  .seg-item { padding: 6px 14px; border-radius: 999px; font-size: 12px; font-weight: 700; color: var(--td); cursor: pointer; transition: color .18s, background .18s; }
  .seg-item.active { color: #0b0b12; background: var(--grad); }
  .back { display: inline-flex; align-items: center; gap: 8px; padding: 9px 15px; border-radius: 999px; background: rgba(255,255,255,.03); border: 1px solid var(--bd); font-weight: 600; font-size: 14px; color: var(--t); transition: background .2s, border-color .2s, transform .2s; }
  .back:hover { background: rgba(255,255,255,.06); border-color: var(--bdh); transform: translateX(-2px); }

  main { padding: 38px 0 90px; }
  .rise { opacity: 0; transform: translateY(14px); animation: rise .55s cubic-bezier(.2,.7,.2,1) forwards; }
  @keyframes rise { to { opacity: 1; transform: none; } }

  .eyebrow { font-size: 11px; letter-spacing: .24em; color: rgba(167,139,250,.9); text-transform: uppercase; display: inline-flex; align-items: center; gap: 8px; margin-bottom: 12px; }
  .eyebrow::before { content: ""; width: 6px; height: 6px; border-radius: 50%; background: var(--violet); }
  h1 { font-size: 36px; line-height: 1.05; letter-spacing: -.03em; margin: 0 0 10px; font-weight: 800; }
  h2 { font-size: 22px; letter-spacing: -.02em; margin: 0 0 6px; font-weight: 800; }
  .sub { color: rgba(255,255,255,.6); font-size: 16px; margin: 0 0 28px; }

  .card { position: relative; background: linear-gradient(180deg, rgba(255,255,255,.02), transparent), var(--card); border: 1px solid var(--bd); border-radius: var(--r); }
  .panel { background: var(--card2); border: 1px solid var(--bd); border-radius: var(--r); padding: 22px; margin-bottom: 18px; }
  .panel-title { font-size: 11px; letter-spacing: .16em; text-transform: uppercase; color: var(--tm); font-weight: 700; margin: 0 0 14px; }

  .i { width: 16px; height: 16px; stroke: currentColor; fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
  .i-lg { width: 22px; height: 22px; }
  .i-md { width: 14px; height: 14px; }

  .btn-primary { background: var(--grad); color: #0b0b12; border-radius: 999px; padding: 12px 22px; font-weight: 800; font-size: 15px; display: inline-flex; align-items: center; justify-content: center; gap: 8px; transition: transform .2s, box-shadow .2s; box-shadow: 0 10px 30px -12px rgba(86,212,255,.6); }
  .btn-primary:hover { transform: translateY(-1px); box-shadow: 0 14px 36px -12px rgba(86,212,255,.75); }
  .btn-primary:disabled { opacity: .5; cursor: not-allowed; transform: none; }
  .btn-ghost { background: rgba(255,255,255,.04); border: 1px solid var(--bd); color: var(--t); border-radius: 999px; padding: 11px 20px; font-weight: 700; font-size: 14px; display: inline-flex; align-items: center; gap: 8px; transition: background .2s, border-color .2s; }
  .btn-ghost:hover { background: rgba(255,255,255,.07); border-color: var(--bdh); }
  .btn-ghost:disabled { opacity: .45; cursor: not-allowed; }

  .actions { display: flex; align-items: center; gap: 12px; margin-top: 22px; flex-wrap: wrap; }
  .hidden { display: none !important; }

  .loading { display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 16px; padding: 80px 0; color: var(--td); font-size: 15px; }
  .spinner { width: 34px; height: 34px; border-radius: 50%; border: 3px solid rgba(255,255,255,.1); border-top-color: var(--indigo); animation: spin .8s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }

  .errbox { display: none; background: rgba(248,113,113,.08); border: 1px solid rgba(248,113,113,.3); color: #fca5a5; padding: 16px 20px; border-radius: 14px; font-size: 14px; margin-bottom: 20px; }
  .errbox.show { display: block; }
  .toast { position: fixed; bottom: 26px; left: 50%; transform: translateX(-50%) translateY(20px); background: var(--card2); border: 1px solid var(--bdh); color: var(--t); padding: 13px 22px; border-radius: 999px; font-size: 14px; font-weight: 600; opacity: 0; pointer-events: none; transition: opacity .25s, transform .25s; z-index: 50; box-shadow: 0 20px 50px -12px rgba(0,0,0,.6); }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  /* ============ Audio player ============ */
  .player-box { display: flex; align-items: center; gap: 16px; }
  .play-btn { width: 56px; height: 56px; border-radius: 50%; background: var(--grad); color: #0b0b12; display: flex; align-items: center; justify-content: center; flex-shrink: 0; transition: transform .2s; }
  .play-btn:hover:not(:disabled) { transform: scale(1.05); }
  .play-btn:disabled { opacity: .4; cursor: not-allowed; }
  .player-mid { flex: 1; min-width: 0; }
  .player-track { height: 6px; border-radius: 3px; background: rgba(255,255,255,.08); overflow: hidden; margin-bottom: 8px; }
  .player-fill { height: 100%; background: var(--grad); width: 0%; transition: width .1s linear; }
  .player-meta { display: flex; justify-content: space-between; font-size: 12px; color: var(--tm); }
  .plays-left { font-size: 12px; font-weight: 700; color: var(--amber); white-space: nowrap; }
  .plays-left.zero { color: var(--tm); }

  /* ============ Matching pills (speakers x statements) ============ */
  .speaker-row { display: flex; align-items: flex-start; gap: 16px; padding: 16px 0; border-bottom: 1px solid var(--bd); }
  .speaker-row:last-child { border-bottom: none; }
  .speaker-badge { flex-shrink: 0; width: 40px; height: 40px; border-radius: 12px; background: rgba(124,140,255,.15); border: 1px solid rgba(124,140,255,.35); color: var(--indigo); display: flex; align-items: center; justify-content: center; font-weight: 800; font-size: 14px; }
  .speaker-label { flex: 1; font-size: 14.5px; font-weight: 700; color: var(--t); padding-top: 9px; }
  .pills { display: flex; flex-wrap: wrap; gap: 8px; }
  .pill { min-width: 38px; height: 38px; padding: 0 10px; border-radius: 10px; background: rgba(255,255,255,.04); border: 1px solid var(--bd); font-weight: 800; font-size: 14px; color: var(--td); display: inline-flex; align-items: center; justify-content: center; transition: all .18s; }
  .pill:hover:not(:disabled) { border-color: var(--bdh); color: #fff; }
  .pill.sel { background: var(--grad); color: #0b0b12; border-color: transparent; box-shadow: 0 6px 18px -8px rgba(86,212,255,.6); }
  .pill.sel.ok { background: linear-gradient(135deg,#34d399,#10b981); color: #04120c; box-shadow: 0 6px 18px -8px rgba(52,211,153,.7); }
  .pill.sel.bad { background: linear-gradient(135deg,#f87171,#ef4444); color: #1a0606; box-shadow: 0 6px 18px -8px rgba(248,113,113,.7); }
  .pill.reveal { background: transparent; border: 1.5px dashed rgba(52,211,153,.7); color: #6ee7b7; }
  .pill:disabled { cursor: default; }

  .statements-legend { display: flex; flex-direction: column; gap: 8px; margin-top: 4px; }
  .stmt-item { display: flex; gap: 10px; font-size: 13.5px; line-height: 1.5; color: rgba(255,255,255,.75); }
  .stmt-letter { flex-shrink: 0; font-weight: 800; color: var(--violet); width: 18px; }
  .stmt-item.used-correctly .stmt-letter { color: var(--green); }
  .stmt-item.distractor-used .stmt-letter { color: var(--red); }

  .score-badge { margin-left: auto; font-size: 15px; font-weight: 800; }

  .expl-trigger { margin-top: 10px; display: inline-flex; align-items: center; gap: 6px; padding: 6px 12px; border-radius: 999px; background: rgba(52,211,153,.08); border: 1px solid rgba(52,211,153,.3); color: var(--green); font-size: 11px; font-weight: 800; letter-spacing: .08em; text-transform: uppercase; transition: background .18s, border-color .18s; }
  .expl-trigger:hover { background: rgba(52,211,153,.14); border-color: rgba(52,211,153,.5); }
  .expl-trigger svg { transition: transform .2s; }
  .expl-trigger.open svg { transform: rotate(90deg); }
  .expl { margin-top: 10px; background: rgba(255,255,255,.025); border: 1px solid var(--bd); border-left: 3px solid var(--green); border-radius: 10px; padding: 12px 14px; display: none; }
  .expl.show { display: block; animation: rise .4s ease forwards; }
  .expl .tag { font-size: 10.5px; letter-spacing: .16em; text-transform: uppercase; font-weight: 800; color: var(--green); margin-bottom: 6px; }
  .expl .txt { font-size: 13.5px; line-height: 1.6; color: rgba(255,255,255,.82); }

  /* ============ Chat (тот же паттерн, что speaking/reading) ============ */
  .chat-fab { position: fixed; right: 24px; bottom: 24px; width: 54px; height: 54px; border-radius: 50%; background: var(--grad); color: #0b0b12; display: flex; align-items: center; justify-content: center; box-shadow: 0 16px 40px -12px rgba(86,212,255,.6); z-index: 40; transition: transform .2s; }
  .chat-fab:hover { transform: scale(1.06); }
  .chat-fab .dots { font-size: 20px; font-weight: 800; letter-spacing: 2px; margin-top: -6px; }
  .chat-panel { position: fixed; right: 24px; bottom: 90px; width: min(380px, calc(100vw - 32px)); height: min(520px, calc(100vh - 140px)); background: var(--card); border: 1px solid var(--bdh); border-radius: 20px; display: flex; flex-direction: column; box-shadow: 0 30px 80px -20px rgba(0,0,0,.7); z-index: 41; opacity: 0; transform: translateY(16px) scale(.98); pointer-events: none; transition: opacity .2s, transform .2s; }
  .chat-panel.open { opacity: 1; transform: none; pointer-events: auto; }
  .chat-head { display: flex; align-items: center; justify-content: space-between; padding: 16px 18px; border-bottom: 1px solid var(--bd); }
  .chat-title { font-weight: 800; font-size: 14px; }
  .chat-close { color: var(--td); padding: 4px; }
  .chat-log { flex: 1; overflow-y: auto; padding: 16px 18px; display: flex; flex-direction: column; gap: 12px; }
  .chat-msg { font-size: 13.5px; line-height: 1.5; padding: 10px 13px; border-radius: 12px; max-width: 88%; }
  .chat-msg.user { align-self: flex-end; background: rgba(124,140,255,.16); color: #dfe3ff; }
  .chat-msg.ai { align-self: flex-start; background: rgba(255,255,255,.05); color: rgba(255,255,255,.85); }
  .chat-form { display: flex; gap: 8px; padding: 14px; border-top: 1px solid var(--bd); }
  .chat-input { flex: 1; background: rgba(255,255,255,.04); border: 1px solid var(--bd); border-radius: 999px; padding: 10px 16px; color: var(--t); font-size: 13.5px; outline: none; }
  .chat-input:focus { border-color: var(--bdh); }
  .chat-send { width: 38px; height: 38px; border-radius: 50%; background: var(--grad); color: #0b0b12; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
</style>
</head>
<body style="visibility: hidden">
<div class="ambient"></div>
<div class="grain"></div>

<header>
  <div class="wrap hd">
    <button class="back" id="topBack">
      <svg class="i" viewBox="0 0 24 24"><path d="M15 18l-6-6 6-6" /></svg>
      <span data-i="back">Atpakaļ</span>
    </button>
    <div class="logo">
      <div class="logo-b">
        <svg class="i i-lg" viewBox="0 0 24 24"><path d="M3 10v4a1 1 0 0 0 1 1h3l4 4V5L7 9H4a1 1 0 0 0-1 1z"/><path d="M16 8a5 5 0 0 1 0 8"/><path d="M19 5a9 9 0 0 1 0 14"/></svg>
      </div>
      <div>
        <div class="logo-t">English <span>OL</span></div>
        <div class="logo-s" data-i="subject">Klausīšanās · 1. uzdevums</div>
      </div>
    </div>
    <div class="cluster">
      <div class="seg">
        <div class="seg-item active" data-lang="lv">LV</div>
        <div class="seg-item" data-lang="ru">RU</div>
      </div>
    </div>
  </div>
</header>

<main>
  <div class="wrap">
    <div class="rise">
      <div class="eyebrow" data-i="eyebrow">KLAUSĪŠANĀS · TASK 1</div>
      <h1 data-i="h1">Sasaiste (Matching)</h1>
      <p class="sub" data-i="sub">Noklausies 6 runātājus un katram atrodi atbilstošu apgalvojumu. 6 punkti.</p>
    </div>

    <div id="loadingBox" class="loading">
      <div class="spinner"></div>
      <div data-i="generating">AI gatavo uzdevumu (teksts + audio)…</div>
    </div>
    <div id="errBox" class="errbox"></div>

    <div id="content" class="hidden">
      <div class="panel rise">
        <p class="panel-title" data-i="audioTitle">Ieraksts</p>
        <div class="player-box">
          <button class="play-btn" id="playBtn">
            <svg class="i i-lg" id="playIcon" viewBox="0 0 24 24" fill="currentColor" stroke="none"><path d="M8 5v14l11-7z"/></svg>
          </button>
          <div class="player-mid">
            <div class="player-track"><div class="player-fill" id="playerFill"></div></div>
            <div class="player-meta"><span id="timeNow">0:00</span><span id="timeTotal">0:00</span></div>
          </div>
          <div class="plays-left" id="playsLeft">2 / 2</div>
        </div>
        <audio id="audioEl" style="display:none"></audio>
      </div>

      <div class="panel rise" style="animation-delay:60ms">
        <p class="panel-title" data-i="statementsTitle">Apgalvojumi (A–H)</p>
        <div class="statements-legend" id="statementsLegend"></div>
      </div>

      <div class="panel rise" style="animation-delay:100ms">
        <p class="panel-title" data-i="speakersTitle">Runātāji</p>
        <div id="speakersBox"></div>
      </div>

      <div class="actions">
        <button class="btn-primary" id="checkBtn">
          <svg class="i i-md" viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>
          <span data-i="check">Pārbaudīt</span>
        </button>
        <button class="btn-ghost" id="saveBtn">
          <svg class="i i-md" viewBox="0 0 24 24"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg>
          <span data-i="save">Saglabāt profilā</span>
        </button>
        <button class="btn-ghost" id="regenBtn">
          <svg class="i i-md" viewBox="0 0 24 24"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></svg>
          <span data-i="newTask">Jauns uzdevums</span>
        </button>
        <span class="score-badge hidden" id="scoreBox"></span>
      </div>
    </div>
  </div>
</main>

<div class="toast" id="toast"><svg class="i i-md" viewBox="0 0 24 24" style="color:var(--green)"><polyline points="20 6 9 17 4 12"/></svg><span id="toastMsg"></span></div>

<button class="chat-fab hidden" id="chatFab"><span class="dots">•••</span></button>
<div class="chat-panel" id="chatPanel">
  <div class="chat-head">
    <span class="chat-title" data-i="chatTitle">Jautā par uzdevumu</span>
    <button class="chat-close" id="chatClose"><svg class="i" viewBox="0 0 24 24"><path d="M18 6L6 18M6 6l12 12" /></svg></button>
  </div>
  <div class="chat-log" id="chatLog"></div>
  <form class="chat-form" id="chatForm">
    <input class="chat-input" id="chatInput" data-i-placeholder="chatPlaceholder" placeholder="Uzdod jautājumu…" autocomplete="off" />
    <button class="chat-send" type="submit"><svg class="i" viewBox="0 0 24 24"><path d="M22 2L11 13M22 2l-7 20-4-9-9-4 20-7z" /></svg></button>
  </form>
</div>

<script>
  /* ================= Конфиг ================= */
  const LISTENING_WORKER_URL = "https://listening-worker.gegeodin.workers.dev/";

  /* ================= i18n ================= */
  const dict = {
    lv: {
      back: "Atpakaļ", subject: "Klausīšanās · 1. uzdevums", eyebrow: "KLAUSĪŠANĀS · TASK 1",
      h1: "Sasaiste (Matching)", sub: "Noklausies 6 runātājus un katram atrodi atbilstošu apgalvojumu. 6 punkti.",
      generating: "AI gatavo uzdevumu (teksts + audio)…",
      audioTitle: "Ieraksts", statementsTitle: "Apgalvojumi (A–H)", speakersTitle: "Runātāji",
      check: "Pārbaudīt", save: "Saglabāt profilā", newTask: "Jauns uzdevums",
      chatTitle: "Jautā par uzdevumu", chatPlaceholder: "Uzdod jautājumu…",
      speaker: "Runātājs", scoreLbl: "Rezultāts", savedOk: "Uzdevums saglabāts profilā",
      pickAll: "Lūdzu, atbildi par visiem runātājiem", genErr: "Neizdevās ģenerēt uzdevumu. Mēģini vēlreiz.",
      chatErr: "Neizdevās saņemt atbildi. Mēģini vēlreiz.", explTag: "Paskaidrojums",
      playsLeftLbl: "atskaņojumi", audioErr: "Neizdevās ielādēt audio.",
      retryCountdown: "Pagaidi vēl {s} s…",
    },
    ru: {
      back: "Назад", subject: "Слушание · Задание 1", eyebrow: "СЛУШАНИЕ · ЗАДАНИЕ 1",
      h1: "Сопоставление (Matching)", sub: "Прослушай 6 говорящих и найди подходящее утверждение для каждого. 6 баллов.",
      generating: "ИИ готовит задание (текст + аудио)…",
      audioTitle: "Запись", statementsTitle: "Утверждения (A–H)", speakersTitle: "Говорящие",
      check: "Проверить", save: "Сохранить в профиль", newTask: "Новое задание",
      chatTitle: "Спроси про задание", chatPlaceholder: "Задай вопрос…",
      speaker: "Говорящий", scoreLbl: "Результат", savedOk: "Задание сохранено в профиль",
      pickAll: "Пожалуйста, ответь за всех говорящих", genErr: "Не удалось создать задание. Попробуй ещё раз.",
      chatErr: "Не удалось получить ответ. Попробуй ещё раз.", explTag: "Объяснение",
      playsLeftLbl: "прослушиваний", audioErr: "Не удалось загрузить аудио.",
      retryCountdown: "Подожди ещё {s} с…",
    },
  };
  let lang = "lv";

  function $(sel) { return document.querySelector(sel); }
  function esc(str) { const d = document.createElement("div"); d.textContent = str == null ? "" : String(str); return d.innerHTML; }
  function showToast(msg) { const t = $("#toast"); t.textContent = msg; t.classList.add("show"); setTimeout(() => t.classList.remove("show"), 2400); }

  function applyLang() {
    document.querySelectorAll("[data-i]").forEach(el => { const k = el.getAttribute("data-i"); if (dict[lang][k] !== undefined) el.textContent = dict[lang][k]; });
    document.querySelectorAll("[data-i-placeholder]").forEach(el => { const k = el.getAttribute("data-i-placeholder"); if (dict[lang][k] !== undefined) el.setAttribute("placeholder", dict[lang][k]); });
    if (currentTask) renderAll();
  }
  document.querySelectorAll(".seg-item[data-lang]").forEach(el => {
    el.addEventListener("click", () => {
      lang = el.getAttribute("data-lang");
      document.querySelectorAll(".seg-item[data-lang]").forEach(s => s.classList.toggle("active", s === el));
      applyLang();
    });
  });

  /* ================= Состояние ================= */
  let currentTask = null; // { id, task1: {statements, correctMap, audioKey}, maxScore }
  let userAnswers = {}; // { "1": "C", ... } speaker n -> chosen letter
  let graded = false;
  let playsUsed = 0;
  const MAX_PLAYS = 2;
  let chatOpen = false;

  function goMenu() { window.location.href = "/l/menu.html"; }
  $("#topBack").addEventListener("click", goMenu);

  /* ================= Генерация ================= */
  async function generate() {
    graded = false; userAnswers = {}; playsUsed = 0;
    $("#content").classList.add("hidden");
    $("#errBox").classList.remove("show");
    $("#loadingBox").classList.remove("hidden");
    $("#chatFab").classList.add("hidden");
    $("#chatLog").innerHTML = "";
    window.scrollTo({ top: 0, behavior: "smooth" });

    const token = localStorage.getItem("session_token");
    if (!token) return;

    try {
      const res = await fetch(LISTENING_WORKER_URL + "generate-listening-task", {
        method: "POST",
        headers: { "Content-Type": "application/json", Authorization: "Bearer " + token },
        body: "{}",
      });
      if (res.status === 401 || res.status === 403) {
        localStorage.removeItem("session_token");
        location.href = "/l/login.html?expired=1";
        return;
      }
      const data = await res.json().catch(() => ({}));
      if (!res.ok) {
        if (res.status === 429 && data.retryAfterSeconds) {
          $("#loadingBox").classList.add("hidden");
          startRetryCountdown(data.retryAfterSeconds);
          return;
        }
        throw new Error(data.error || dict[lang].genErr);
      }
      currentTask = data.task;
      $("#loadingBox").classList.add("hidden");
      $("#content").classList.remove("hidden");
      $("#chatFab").classList.remove("hidden");
      setupAudio();
      renderAll();
    } catch (err) {
      $("#loadingBox").classList.add("hidden");
      $("#errBox").textContent = (err && err.message) || dict[lang].genErr;
      $("#errBox").classList.add("show");
    }
  }

  function startRetryCountdown(seconds) {
    let remaining = Math.ceil(seconds);
    const eb = $("#errBox");
    eb.classList.add("show");
    function render() { eb.textContent = dict[lang].retryCountdown.replace("{s}", remaining); }
    render();
    const iv = setInterval(() => {
      remaining -= 1;
      if (remaining <= 0) { clearInterval(iv); eb.classList.remove("show"); return; }
      render();
    }, 1000);
  }

  $("#regenBtn").addEventListener("click", generate);

  /* ================= Audio player (max 2 plays) ================= */
  function setupAudio() {
    const audioEl = $("#audioEl");
    const token = localStorage.getItem("session_token");
    audioEl.src = LISTENING_WORKER_URL + "audio/" + currentTask.id + "/1?token=" + encodeURIComponent(token);
    updatePlaysLeft();
    $("#playBtn").disabled = false;

    audioEl.addEventListener("loadedmetadata", () => { $("#timeTotal").textContent = fmtTime(audioEl.duration); });
    audioEl.addEventListener("timeupdate", () => {
      if (audioEl.duration) {
        $("#playerFill").style.width = (audioEl.currentTime / audioEl.duration * 100) + "%";
        $("#timeNow").textContent = fmtTime(audioEl.currentTime);
      }
    });
    audioEl.addEventListener("ended", () => {
      setPlayIcon(false);
      if (playsUsed >= MAX_PLAYS) $("#playBtn").disabled = true;
    });
    audioEl.addEventListener("error", () => { showToast(dict[lang].audioErr); });
  }

  function fmtTime(s) {
    if (!isFinite(s)) return "0:00";
    const m = Math.floor(s / 60), r = Math.floor(s % 60);
    return m + ":" + String(r).padStart(2, "0");
  }

  function updatePlaysLeft() {
    const left = Math.max(0, MAX_PLAYS - playsUsed);
    const el = $("#playsLeft");
    el.textContent = left + " / " + MAX_PLAYS;
    el.classList.toggle("zero", left === 0);
  }

  function setPlayIcon(playing) {
    $("#playIcon").innerHTML = playing
      ? '<rect x="6" y="5" width="4" height="14"/><rect x="14" y="5" width="4" height="14"/>'
      : '<path d="M8 5v14l11-7z"/>';
  }

  $("#playBtn").addEventListener("click", () => {
    const audioEl = $("#audioEl");
    if (audioEl.paused) {
      if (audioEl.currentTime === 0 || audioEl.ended) {
        if (playsUsed >= MAX_PLAYS) return;
        playsUsed += 1;
        updatePlaysLeft();
      }
      if (audioEl.ended) audioEl.currentTime = 0;
      audioEl.play();
      setPlayIcon(true);
    } else {
      audioEl.pause();
      setPlayIcon(false);
    }
  });

  /* ================= Рендер ================= */
  function renderAll() {
    const t1 = currentTask.task1;

    // Statements legend A-H
    const legend = $("#statementsLegend");
    legend.innerHTML = "";
    const usedLetters = graded ? new Set(Object.values(t1.correctMap)) : null;
    t1.statements.forEach(s => {
      let cls = "stmt-item";
      if (graded) cls += usedLetters.has(s.letter) ? " used-correctly" : " distractor-used";
      const explText = (lang === "ru" ? s.explanation_ru : s.explanation_lv) || "";
      const explBlock = (graded && explText)
        ? `<button type="button" class="expl-trigger" data-stmt="${esc(s.letter)}">
             <svg class="i i-md" viewBox="0 0 24 24"><polyline points="9 18 15 12 9 6"/></svg>
             ${dict[lang].explTag}
           </button>
           <div class="expl" id="expl-stmt-${esc(s.letter)}"><div class="txt">${esc(explText)}</div></div>`
        : "";
      legend.insertAdjacentHTML("beforeend",
        `<div class="${cls}"><div style="flex:1"><div style="display:flex;gap:10px"><span class="stmt-letter">${esc(s.letter)}</span><span>${esc(s.text)}</span></div>${explBlock}</div></div>`);
    });
    bindStmtExplTriggers();

    // Speakers rows with pills
    const box = $("#speakersBox");
    box.innerHTML = "";
    for (let n = 1; n <= 6; n++) {
      const sel = userAnswers[n];
      const correct = t1.correctMap[String(n)];
      const pills = t1.statements.map(s => {
        const isSel = sel === s.letter;
        let cls = "pill" + (isSel ? " sel" : "");
        if (graded) {
          if (isSel) cls += (s.letter === correct ? " ok" : " bad");
          else if (s.letter === correct) cls += " reveal";
        }
        return `<button class="${cls}" data-n="${n}" data-letter="${esc(s.letter)}" ${graded ? "disabled" : ""}>${esc(s.letter)}</button>`;
      }).join("");

      box.insertAdjacentHTML("beforeend", `
        <div class="speaker-row">
          <div class="speaker-badge">${n}</div>
          <div class="speaker-label">${dict[lang].speaker} ${n}</div>
          <div class="pills">${pills}</div>
        </div>
      `);
    }
    bindPills();

    $("#checkBtn").classList.toggle("hidden", graded);
  }

  function bindPills() {
    document.querySelectorAll(".pill[data-n]").forEach(btn => {
      btn.addEventListener("click", () => {
        if (graded) return;
        const n = btn.getAttribute("data-n");
        userAnswers[n] = btn.getAttribute("data-letter");
        renderAll();
      });
    });
  }

  function bindStmtExplTriggers() {
    document.querySelectorAll(".expl-trigger[data-stmt]").forEach(btn => {
      btn.addEventListener("click", () => {
        const letter = btn.getAttribute("data-stmt");
        const el = $("#expl-stmt-" + letter);
        const open = el.classList.toggle("show");
        btn.classList.toggle("open", open);
      });
    });
  }

  /* ================= Проверка ================= */
  $("#checkBtn").addEventListener("click", () => {
    const answeredCount = Object.keys(userAnswers).length;
    if (answeredCount < 6) { showToast(dict[lang].pickAll); return; }
    graded = true;
    let correct = 0;
    for (let n = 1; n <= 6; n++) {
      if (userAnswers[n] === currentTask.task1.correctMap[String(n)]) correct++;
    }
    renderAll();
    const sb = $("#scoreBox");
    sb.innerHTML = `${dict[lang].scoreLbl}: <span class="mono" style="color:${correct === 6 ? "var(--green)" : "var(--cyan)"}">${correct}/6</span>`;
    sb.classList.remove("hidden");
    sendSolve(correct, 6);
    window.scrollTo({ top: 0, behavior: "smooth" });
  });

  async function sendSolve(score, max) {
    const token = localStorage.getItem("session_token");
    if (!token) return;
    try {
      await fetch(LISTENING_WORKER_URL + "solve", {
        method: "POST",
        headers: { "Content-Type": "application/json", Authorization: "Bearer " + token },
        body: JSON.stringify({ totalScore: score, totalMax: max }),
      });
    } catch (e) {}
  }

  /* ================= Сохранение ================= */
  $("#saveBtn").addEventListener("click", async () => {
    if (!currentTask) return;
    const token = localStorage.getItem("session_token");
    if (!token) return;
    const btn = $("#saveBtn");
    btn.disabled = true;
    try {
      let correct = 0;
      for (let n = 1; n <= 6; n++) if (userAnswers[n] === currentTask.task1.correctMap[String(n)]) correct++;
      const res = await fetch(LISTENING_WORKER_URL + "save-task", {
        method: "POST",
        headers: { "Content-Type": "application/json", Authorization: "Bearer " + token },
        body: JSON.stringify({
          task: { kind: "listening", title: "Klausīšanās — 1. uzdevums", result: { part: 1, score: correct, max: 6, userAnswers, statements: currentTask.task1.statements, correctMap: currentTask.task1.correctMap } },
        }),
      });
      const data = await res.json().catch(() => ({}));
      if (!res.ok) throw new Error(data.error || "");
      showToast(dict[lang].savedOk);
    } catch (err) {
      showToast((err && err.message) || dict[lang].savedOk);
    } finally {
      btn.disabled = false;
    }
  });

  /* ================= Чат с ИИ ================= */
  $("#chatFab").addEventListener("click", () => {
    chatOpen = !chatOpen;
    $("#chatPanel").classList.toggle("open", chatOpen);
    if (chatOpen) $("#chatInput").focus();
  });
  $("#chatClose").addEventListener("click", () => { chatOpen = false; $("#chatPanel").classList.remove("open"); });

  function appendChatMsg(role, text) {
    const log = $("#chatLog");
    const div = document.createElement("div");
    div.className = "chat-msg " + role;
    div.textContent = text;
    log.appendChild(div);
    log.scrollTop = log.scrollHeight;
    return div;
  }

  function buildTaskSummary() {
    const t1 = currentTask.task1;
    return "Task 1 (matching). Statements: " + t1.statements.map(s => s.letter + ") " + s.text).join(" | ") +
      ". Correct map (speaker->letter): " + JSON.stringify(t1.correctMap);
  }

  $("#chatForm").addEventListener("submit", async (e) => {
    e.preventDefault();
    const input = $("#chatInput");
    const question = input.value.trim();
    if (!question || !currentTask) return;
    input.value = "";
    appendChatMsg("user", question);
    const pendingEl = appendChatMsg("ai", "…");
    const token = localStorage.getItem("session_token");
    if (!token) return;
    try {
      const res = await fetch(LISTENING_WORKER_URL + "ask-question", {
        method: "POST",
        headers: { "Content-Type": "application/json", Authorization: "Bearer " + token },
        body: JSON.stringify({ taskSummary: buildTaskSummary(), question, lang }),
      });
      const data = await res.json().catch(() => ({}));
      if (!res.ok) throw new Error(data.error || dict[lang].chatErr);
      pendingEl.textContent = data.answer;
    } catch (err) {
      pendingEl.textContent = (err && err.message) || dict[lang].chatErr;
    }
  });

  /* ================= Инициализация ================= */
  function init() {
    document.body.style.visibility = "visible";
    applyLang();
    generate();
  }
  if (window.authReady) init();
  else document.addEventListener("auth-ready", init, { once: true });
</script>
</body>
</html>
