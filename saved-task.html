lass="panel-title" data-i="statementsTitle">Apgalvojumi</p> <table class="answers"> <thead><tr> <th style="width:40px">#</th> <th data-i="questionCol">Jautājums</th> <th data-i="answerCol">Atbilde</th> </tr></thead> <tbody id="statementsBody"></tbody> </table> </div> </div> </main> <script> const dict = { lv:{ back:"Atpakaļ", savedPage:"Saglabāts", loading:"Ielādē…", notFound:"Uzdevums nav atrasts.", textsTitle:"Teksti", answersTitle:"Atbilžu tabula", questionCol:"Jautājums", answerCol:"Atbilde", headingsTitle:"Virsrakstu saskaņošana", paragraphCol:"Rindkopa", statementsTitle:"Apgalvojumi", explTag:"Paskaidrojums", proofTag:"Pierādījums tekstā", savedOn:"Saglabāts", expandText:"Rādīt visu tekstu", collapseText:"Paslēpt tekstu", locale:"lv-LV" }, ru:{ back:"Назад", savedPage:"Сохранено", loading:"Загрузка…", notFound:"Задание не найдено.", textsTitle:"Тексты", answersTitle:"Таблица ответов", questionCol:"Вопрос", answerCol:"Ответ", headingsTitle:"Сопоставление заголовков", paragraphCol:"Абзац", statementsTitle:"Утверждения", explTag:"Объяснение", proofTag:"Доказательство в тексте", savedOn:"Сохранено", expandText:"Показать весь текст", collapseText:"Свернуть текст", locale:"ru-RU" } }; let lang = "lv"; let savedTask = null; const $ = s => document.querySelector(s); const $$ = s => document.querySelectorAll(s); const esc = s => (s==null?"":String(s)).replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));
let _bodyIdCounter = 0;
function bodyBlockHTML(text){
  const id = "body-" + (_bodyIdCounter++);
  const t = dict[lang];
  const long = (text || "").length > 500;
  if (!long) return `<div class="body">${esc(text||"")}</div>`;
  return `<div class="body collapsed" id="${id}">${esc(text||"")}</div><button type="button" class="text-toggle" data-target="${id}"><svg class="i i-md" viewBox="0 0 24 24"><polyline points="6 9 12 15 18 9"/></svg><span>${t.expandText}</span></button>`;
}
function bindTextToggles(){
  document.querySelectorAll(".text-toggle").forEach(btn=>{
    btn.addEventListener("click",()=>{
      const target = document.getElementById(btn.dataset.target);
      const nowOpen = target.classList.contains("collapsed");
      target.classList.toggle("collapsed", !nowOpen);
      btn.classList.toggle("open", nowOpen);
      btn.querySelector("span").textContent = nowOpen ? dict[lang].collapseText : dict[lang].expandText;
    });
  });
}
function applyLang(){ const t = dict[lang]; $$('[data-i]').forEach(el=>{ if(t[el.dataset.i]!==undefined) el.textContent=t[el.dataset.i]; }); document.documentElement.lang = lang; if(savedTask) renderSaved(); } $$('.seg-item[data-lang]').forEach(el=>{ el.addEventListener('click',()=>{ $$('.seg-item[data-lang]').forEach(x=>x.classList.remove('active')); el.classList.add('active'); lang = el.dataset.lang; applyLang(); }); }); $('#topBack').addEventListener('click', ()=>{ location.href = "/l/menu.html"; }); 
function renderSavedWriting(task){
  document.getElementById('loadingBox').classList.add('hidden');
  document.getElementById('taskContent').classList.remove('hidden');
  Array.from(document.getElementById('taskContent').children).forEach(function(child){
    if (child.id !== 'writingSavedView') child.style.display = 'none';
  });
  var wv = document.getElementById('writingSavedView');
  wv.classList.remove('hidden');
  var ctx = task.taskContext || {};
  var grade = task.grade || {};
  var isRu = lang === "ru";
  var critLabels = {
    content: isRu ? "Содержание" : "Saturs",
    organization: isRu ? "Структура" : "Struktūra",
    language: isRu ? "Язык" : "Valoda",
    languageRange: isRu ? "Разнообразие языка" : "Valodas daudzveidība",
    languageAccuracy: isRu ? "Грамотность" : "Valodas pareizība",
  };
  function esc(s){ var d = document.createElement('div'); d.textContent = s || ""; return d.innerHTML; }
  function tone(score, max){ var r = max > 0 ? score / max : 0; return r >= 0.7 ? "tone-green" : (r >= 0.4 ? "tone-amber" : "tone-red"); }

  var sourceHtml = "";
  if (task.taskType === "task2") {
    sourceHtml =
      '<p class="panel-title">' + (isRu ? "ИСТОЧНИКИ" : "AVOTI") + '</p>' +
      '<div class="texts">' +
      '<div class="text-item"><div class="lbl"><span class="letter">1</span><span class="author">' + esc(ctx.source1 && ctx.source1.label) + '</span></div><div class="body">' + esc(ctx.source1 && ctx.source1.text) + '</div></div>' +
      '<div class="text-item"><div class="lbl"><span class="letter">2</span><span class="author">' + esc(ctx.source2 && ctx.source2.label) + '</span></div><div class="body">' + esc(ctx.source2 && ctx.source2.text) + '</div></div>' +
      '</div>';
  } else {
    sourceHtml =
      '<p class="panel-title">' + (isRu ? "ОБЪЯВЛЕНИЕ" : "SLUDINĀJUMS") + '</p>' +
      '<div class="text-item"><div class="body">' + esc(ctx.adText) + '</div></div>';
  }

  var tilesHtml = '<div class="crit-tile hero"><div class="crit-label">' + (isRu ? "Всего" : "Kopā") + '</div><div class="crit-score mono ' + tone(grade.totalScore, grade.totalMax) + '">' + grade.totalScore + '/' + grade.totalMax + '</div></div>';
  (grade.criteria || []).forEach(function(c){
    var tn = tone(c.score, c.maxPoints);
    tilesHtml += '<div class="crit-tile"><div class="crit-label">' + esc(critLabels[c.key] || c.key) + '</div><div class="crit-score mono ' + tn + '">' + c.score + '/' + c.maxPoints + '</div><div class="crit-tip">' + esc(c.tip) + '</div></div>';
  });
  tilesHtml += '<div class="crit-tile"><div class="crit-label">' + (isRu ? "Кол-во слов" : "Vārdu skaits") + '</div><div class="crit-score mono ' + (grade.belowMinWords ? "tone-red" : "tone-green") + '">' + grade.wordCount + '</div><div class="crit-tip">' + grade.minWords + '–' + grade.maxWords + ' ' + (isRu ? "слов" : "vārdi") + '</div></div>';

  wv.innerHTML =
    '<div class="task-head rise"><div class="meta"><h2>' + esc(task.title) + '</h2></div><span class="pts-badge">' + grade.totalMax + ' ' + (isRu ? "баллов" : "punkti") + '</span></div>' +
    '<div class="panel">' + sourceHtml + '</div>' +
    '<div class="panel"><p class="panel-title">' + (isRu ? "ОТВЕТ" : "ATBILDE") + '</p><div class="saved-text-box">' + esc(task.text) + '</div></div>' +
    '<div class="panel"><p class="panel-title">' + (isRu ? "РЕЗУЛЬТАТ" : "REZULTĀTS") + '</p><div class="crit-grid">' + tilesHtml + '</div>' +
    (grade.strengths ? '<div class="feedback-block strengths"><div class="fb-tag">' + (isRu ? "ЧТО ПОЛУЧИЛОСЬ ХОРОШО" : "KAS IZDEVĀS LABI") + '</div><div class="fb-txt">' + esc(grade.strengths) + '</div></div>' : "") +
    (grade.overallTip ? '<div class="feedback-block"><div class="fb-tag">' + (isRu ? "ЧТО УЛУЧШИТЬ" : "KO UZLABOT") + '</div><div class="fb-txt">' + esc(grade.overallTip) + '</div></div>' : "") +
    '<div style="margin-top:8px"><a class="btn-primary" href="/l/writing.html?editSavedId=' + encodeURIComponent(task.id) + '" style="text-decoration:none;display:inline-flex">' + (isRu ? "Редактировать и пересдать" : "Labot un pārbaudīt vēlreiz") + '</a></div>' +
    '</div>';
}
function renderSaved(){ const t = dict[lang]; const task = savedTask; if (task.kind === "writing") { renderSavedWriting(task); return; }  $('#taskEyebrow').textContent = "Reading · " + (task.taskType==="task2" ? "2" : "1"); $('#taskTitle').textContent = task.title || ""; $('#taskInstruction').textContent = task.instruction || ""; const savedDate = new Date(task.savedAt).toLocaleString(t.locale); $('#savedDate').textContent = t.savedOn + ": " + savedDate; const box = $('#textsBox'); box.innerHTML = ""; if(task.taskType==="task2" && task.paragraphs){ task.paragraphs.forEach(p=>{ box.insertAdjacentHTML('beforeend', `<div class="text-item"><div class="lbl"><span class="letter">${esc(p.n)}</span></div>${bodyBlockHTML(p.body)}</div>`); }); } else if(task.texts && task.texts.length){ task.texts.forEach(tx=>{ box.insertAdjacentHTML('beforeend', `<div class="text-item"><div class="lbl"><span class="letter">${esc(tx.letter)}</span><span class="author">${esc(tx.author||"")}</span></div>${bodyBlockHTML(tx.body)}</div>`); }); } else if(task.passage){ box.insertAdjacentHTML('beforeend', `<div class="text-item">${task.title?`<div class="lbl"><span class="author">${esc(task.title)}</span></div>`:""}${bodyBlockHTML(task.passage)}</div>`); } bindTextToggles(); if(task.taskType==="task2"){ $('#answersTitle').textContent = t.headingsTitle; const correctHeadings = (task.headings||[]).filter(h=>h.matchesParagraph!==null); const tb = $('#questionsBody'); tb.innerHTML = ""; for(let pn=1; pn<=6; pn++){ const correctHeading = correctHeadings.find(h=>h.matchesParagraph===pn); const chosenLetter = (task.headingAnswers||{})[pn]; const isCorrect = chosenLetter===(correctHeading?correctHeading.letter:null); const chosenHeading = chosenLetter ? (task.headings||[]).find(h=>h.letter===chosenLetter) : null; const explSrc = chosenHeading || correctHeading; const explText = explSrc ? ((lang==="lv"?explSrc.explanation_lv:explSrc.explanation_ru)||"") : ""; tb.insertAdjacentHTML('beforeend', `<tr><td><div class="q-num">${pn}</div></td><td><div class="q-prompt">${t.paragraphCol} ${pn}</div><div class="expl show"><div class="tag">✦ ${t.explTag}</div><div class="txt">${esc(explText)}</div></div></td><td class="ans-cell ${isCorrect?'correct':'wrong'}"><div class="pills"><button class="pill ${isCorrect?'ok':'bad'}" disabled>${esc(chosenLetter||"—")}</button>${!isCorrect&&correctHeading?`<button class="pill reveal" disabled>${esc(correctHeading.letter)}</button>`:""}</div></td></tr>`); } $('#headingsLegend').classList.remove('hidden'); $('#headingsLegend').innerHTML = (task.headings||[]).map(h=>`<div class="opt"><b>${esc(h.letter)}.</b>${esc(h.text)}</div>`).join(""); $('#statementsPanel').classList.remove('hidden'); const sb = $('#statementsBody'); sb.innerHTML = ""; (task.statements||[]).forEach(st=>{ const chosen = (task.statementAnswers||{})[st.n]; const isCorrect = chosen===st.verdict; const explText = (lang==="lv"?st.explanation_lv:st.explanation_ru)||""; sb.insertAdjacentHTML('beforeend', `<tr><td><div class="q-num">${st.n}</div></td><td><div class="q-prompt">${esc(st.text)}</div><div class="expl show"><div class="tag">✦ ${t.explTag}</div><div class="txt">${esc(explText)}</div></div></td><td class="ans-cell ${isCorrect?'correct':'wrong'}"><div class="pills"><button class="pill ${isCorrect?'ok':'bad'}" disabled>${esc(chosen||"—")}</button>${!isCorrect?`<button class="pill reveal" disabled>${esc(st.verdict)}</button>`:""}</div></td></tr>`); }); } else { $('#statementsPanel').classList.add('hidden'); $('#headingsLegend').classList.add('hidden'); $('#answersTitle').textContent = t.answersTitle; const tb = $('#questionsBody'); tb.innerHTML = ""; (task.questions||[]).forEach(q=>{ const opts = q.options ? q.options.map(o=>o.label) : ["A","B","C","D","E"].slice(0, (task.texts?task.texts.length:5)); const chosen = (task.userAnswers||{})[q.num]; const isCorrect = chosen===q.correct; const pills = opts.map(lab=>{ const isChosen = lab===chosen; const isRight = lab===q.correct; let cls = "pill"; if(isChosen) cls += isRight ? " ok" : " bad"; else if(isRight) cls += " reveal"; else return ""; return `<button class="${cls}" disabled>${esc(lab)}</button>`; }).filter(Boolean).join(""); const explText = (lang==="lv"?q.explanation_lv:q.explanation_ru)||q.explanation||""; const evidenceText = q.evidenceQuote||q.evidence||""; tb.insertAdjacentHTML('beforeend', `<tr><td><div class="q-num">${q.num}</div></td><td><div class="q-prompt">${esc(q.prompt)}</div><div class="expl show"><div class="tag">✦ ${t.explTag}</div><div class="txt">${esc(explText)}</div>${evidenceText?`<div class="proof"><b>${t.proofTag}:</b> "${esc(evidenceText)}"</div>`:""}</div></td><td class="ans-cell ${isCorrect?'correct':'wrong'}"><div class="pills">${pills}</div></td></tr>`); }); } $('#loadingBox').classList.add('hidden'); $('#taskContent').classList.remove('hidden'); } async function loadSavedTask(){ const params = new URLSearchParams(location.search); const id = params.get("id"); if(!id){ $('#loadingBox').classList.add('hidden'); $('#notFoundBox').classList.remove('hidden'); return; } const token = localStorage.getItem("session_token"); if(!token) return; try{ const res = await fetch(AI_WORKER_URL+"get-saved-tasks",{method:"POST",headers:{"Content-Type":"application/json","Authorization":"Bearer "+token},body:"{}"}); if(!res.ok) throw new Error("fetch failed"); const data = await res.json(); const found = (data.tasks||[]).find(t=>t.id===id); if(!found){ $('#loadingBox').classList.add('hidden'); $('#notFoundBox').classList.remove('hidden'); return; } savedTask = found; renderSaved(); }catch(e){ $('#loadingBox').classList.add('hidden'); $('#notFoundBox').classList.remove('hidden'); } } function init(){ applyLang(); loadSavedTask(); } if (window.authReady) { init(); } else { document.addEventListener("auth-ready", init, {once:true}); } </script>
